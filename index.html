<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<title>Life-control</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Raleway:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
/* ═══════════════════════ VARIABLES ═══════════════════════ */
:root{
  --bg:#EDE3CC;--bg-s:#E4D8BB;--bg-p:#F5EDD8;--bg-w:#FDFAF4;
  --br:#7B4F1E;--br-d:#5A3510;--br-l:#A06A2E;
  --go:#C8963E;--go-l:#E4B96A;--go-d:#9A6F28;
  --cr:#F5EDD8;--cr-d:#EAE0C4;
  --red:#C04030;--grn:#4A8A4A;--blu:#3A6EA8;
  --tx:#3A2810;--tx-m:#7B5A30;--tx-l:#A08050;
  --bd:rgba(123,79,30,.2);--bd-s:rgba(123,79,30,.45);
  --sh:rgba(80,40,10,.12);
  --r:8px;--rl:14px;--rxl:20px;--rf:999px;
  --fd:'Cinzel',serif;--fb:'Raleway',sans-serif;
  --tt:170ms ease;
  --sb:280px;--tb:54px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;background:var(--bg);}
body{color:var(--tx);font-family:var(--fb);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased;}

/* ═══════════════════════ SCREENS ═══════════════════════ */
.scr{display:none;position:fixed;inset:0;z-index:1;}
.scr.on{display:flex;}

/* ═══════════════════════ AUTH ═══════════════════════ */
#s-auth{align-items:center;justify-content:center;background:linear-gradient(145deg,#D4C090,#B89040);}
.auth-card{background:var(--bg-w);border:2px solid var(--bd-s);border-radius:var(--rxl);padding:44px 36px;width:100%;max-width:360px;text-align:center;box-shadow:0 12px 48px rgba(80,40,10,.3);}
.a-badge{width:68px;height:68px;background:var(--br);color:#fff;font-family:var(--fd);font-size:20px;font-weight:700;border-radius:var(--rl);display:flex;align-items:center;justify-content:center;margin:0 auto 14px;}
.a-title{font-family:var(--fd);font-size:22px;font-weight:700;color:var(--br-d);margin-bottom:4px;}
.a-sub{font-size:12px;color:var(--tx-m);margin-bottom:28px;}
.a-btn{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:13px;border-radius:var(--rl);border:none;font-family:var(--fd);font-size:12px;font-weight:600;letter-spacing:.06em;cursor:pointer;transition:all var(--tt);margin-bottom:10px;}
.a-g{background:#4285F4;color:#fff;}.a-g:hover{background:#3574e2;transform:translateY(-2px);}
.a-y{background:#CC0000;color:#fff;}.a-y:hover{background:#aa0000;transform:translateY(-2px);}
.a-note{font-size:11px;color:var(--tx-l);margin-top:14px;}

/* ═══════════════════════ APP SHELL ═══════════════════════ */
#s-app{flex-direction:row;}
.topbar{display:none;position:fixed;top:0;left:0;right:0;height:var(--tb);background:var(--br-d);align-items:center;padding:0 14px;gap:10px;z-index:400;}
.tb-burg{background:none;border:none;cursor:pointer;padding:6px;display:flex;flex-direction:column;gap:5px;}
.tb-burg span{display:block;width:20px;height:2px;background:#fff;border-radius:2px;}
.tb-ttl{font-family:var(--fd);font-size:13px;font-weight:700;color:var(--go-l);flex:1;letter-spacing:.06em;}
.tb-new{background:var(--go);color:#fff;border:none;border-radius:var(--r);padding:6px 12px;font-family:var(--fd);font-size:10px;font-weight:700;letter-spacing:.06em;cursor:pointer;}

/* ═══════════════════════ SIDEBAR ═══════════════════════ */
.sidebar{width:var(--sb);min-width:var(--sb);background:var(--bg-p);border-right:2px dashed var(--bd);display:flex;flex-direction:column;z-index:200;overflow:hidden;flex-shrink:0;}
.sb-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:150;}
.sb-ov.on{display:block;}
.sb-prof{padding:18px 16px 14px;border-bottom:2px dashed var(--bd);text-align:center;}
.sb-mo{font-family:var(--fd);font-size:10px;font-weight:600;color:var(--go-d);letter-spacing:.12em;text-transform:uppercase;margin-bottom:10px;}
.sb-av{width:64px;height:64px;border-radius:50%;background:var(--br);border:3px solid var(--go);margin:0 auto 8px;overflow:hidden;display:flex;align-items:center;justify-content:center;font-family:var(--fd);font-size:20px;font-weight:700;color:#fff;flex-shrink:0;}
.sb-av img{width:100%;height:100%;object-fit:cover;}
.sb-un{display:block;font-family:var(--fd);font-size:11px;font-weight:700;color:var(--br-d);}
.sb-ue{display:block;font-size:10px;color:var(--tx-l);margin-top:1px;}
.sb-new{display:block;width:100%;margin:10px 0 0;padding:10px 14px;background:var(--go);color:#fff;font-family:var(--fd);font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;border:none;border-radius:var(--r);cursor:pointer;transition:all var(--tt);}
.sb-new:hover{background:var(--go-l);transform:translateY(-1px);}
.sb-btns{display:flex;gap:6px;margin-top:7px;}
.sb-btn{flex:1;padding:7px 4px;background:var(--br);color:var(--cr);font-family:var(--fd);font-size:9px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;border:none;border-radius:var(--r);cursor:pointer;transition:background var(--tt);}
.sb-btn:hover{background:var(--br-d);}
.sb-body{flex:1;overflow-y:auto;padding:12px 14px;}
.sb-sec{font-family:var(--fd);font-size:9px;font-weight:700;color:var(--tx-l);text-transform:uppercase;letter-spacing:.1em;margin:0 0 7px;padding-bottom:4px;border-bottom:1px solid var(--bd);}

/* ═══════════════════════ MAIN ═══════════════════════ */
.main-area{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.top-nav{display:flex;background:var(--br-d);border-bottom:2px solid var(--go-d);flex-shrink:0;overflow-x:auto;}
.top-nav::-webkit-scrollbar{display:none;}
.nt{flex:1;min-width:70px;padding:13px 6px;font-family:var(--fd);font-size:10px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:rgba(255,255,255,.5);border:none;background:none;cursor:pointer;transition:all var(--tt);border-bottom:3px solid transparent;white-space:nowrap;}
.nt:hover{color:rgba(255,255,255,.85);}
.nt.on{color:var(--go-l);border-bottom-color:var(--go);}
.mwrap{flex:1;overflow:hidden;position:relative;}
.mod{display:none;position:absolute;inset:0;flex-direction:column;overflow:hidden;}
.mod.on{display:flex;}
.mod-hd{background:var(--cr);border-bottom:1px solid var(--bd);padding:11px 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;gap:8px;}
.mod-ttl{font-family:var(--fd);font-size:12px;font-weight:700;color:var(--br);letter-spacing:.08em;text-transform:uppercase;}
.mod-body{flex:1;overflow-y:auto;padding:14px 16px 100px;}

/* ═══════════════════════ COMPONENTS ═══════════════════════ */
/* Day nav */
.dn-row{display:flex;align-items:center;gap:6px;margin-bottom:10px;flex-wrap:wrap;}
.dn-date{flex:1;min-width:140px;background:var(--go);color:#fff;border-radius:var(--r);padding:8px 12px;font-family:var(--fd);font-size:10px;font-weight:700;letter-spacing:.05em;cursor:pointer;border:none;text-align:left;transition:background var(--tt);}
.dn-date:hover{background:var(--go-d);}
.dn-cal-btn{background:var(--go);color:#fff;border:none;border-radius:var(--r);padding:8px 10px;font-size:14px;cursor:pointer;transition:background var(--tt);}
.dn-cal-btn:hover{background:var(--go-d);}
.day-strip{display:flex;align-items:center;gap:4px;margin-bottom:14px;overflow-x:auto;padding-bottom:4px;}
.day-strip::-webkit-scrollbar{display:none;}
.ds-arr{background:var(--go);color:#fff;width:26px;height:26px;min-width:26px;border-radius:50%;border:none;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;transition:background var(--tt);}
.ds-arr:hover{background:var(--go-d);}
.ds-day{width:30px;height:30px;min-width:30px;border-radius:50%;background:var(--go);color:#fff;font-family:var(--fd);font-size:11px;font-weight:700;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all var(--tt);position:relative;}
.ds-day:hover{background:var(--go-d);}
.ds-day.on{background:var(--br-d);}
.ds-day.has-dot::after{content:'';position:absolute;bottom:-3px;left:50%;transform:translateX(-50%);width:4px;height:4px;background:var(--red);border-radius:50%;}
.ds-all{background:var(--cr-d);color:var(--br);font-family:var(--fd);font-size:9px;font-weight:700;letter-spacing:.06em;border:1px solid var(--bd-s);border-radius:var(--r);padding:5px 8px;cursor:pointer;white-space:nowrap;transition:all var(--tt);}
.ds-all:hover,.ds-all.on{background:var(--br);color:#fff;}

/* Item card */
.icard{background:var(--cr);border:1px solid var(--bd);border-radius:var(--rl);padding:12px 14px;margin-bottom:9px;display:flex;align-items:flex-start;gap:10px;transition:all var(--tt);cursor:pointer;}
.icard:hover{border-color:var(--bd-s);box-shadow:0 2px 8px var(--sh);}
.icard.done{opacity:.45;}.icard.done .ic-ttl{text-decoration:line-through;}
.ic-chk{width:22px;height:22px;min-width:22px;border:2px solid var(--bd-s);border-radius:4px;background:var(--bg-w);cursor:pointer;display:flex;align-items:center;justify-content:center;margin-top:1px;transition:all var(--tt);flex-shrink:0;}
.ic-chk:hover{border-color:var(--go);}.ic-chk.on{background:var(--go);border-color:var(--go);color:#fff;font-size:12px;}
.ic-body{flex:1;min-width:0;}
.ic-ttl{font-family:var(--fd);font-size:12px;font-weight:600;color:var(--br-d);text-transform:uppercase;letter-spacing:.04em;margin-bottom:3px;}
.ic-meta{display:flex;flex-wrap:wrap;gap:6px;margin-top:3px;}
.ic-tag{font-size:10px;padding:2px 7px;border-radius:var(--rf);font-weight:600;}
.tag-dl{background:rgba(200,150,62,.15);color:var(--go-d);}
.tag-dl.ov{background:rgba(192,64,48,.12);color:var(--red);}
.tag-goal{background:rgba(123,79,30,.12);color:var(--br);}
.tag-proj{background:rgba(58,110,168,.12);color:var(--blu);}
.tag-pri-high{background:rgba(192,64,48,.15);color:var(--red);}
.tag-pri-med{background:rgba(200,150,62,.15);color:var(--go-d);}
.tag-pri-low{background:rgba(74,138,74,.15);color:var(--grn);}
.ic-sub-list{margin-top:6px;display:flex;flex-direction:column;gap:3px;}
.ic-sub-item{font-size:11px;color:var(--tx-m);padding:2px 0 2px 10px;border-left:2px solid var(--bd);display:flex;align-items:center;gap:6px;}
.ic-acts{display:flex;gap:4px;align-items:center;flex-shrink:0;opacity:0;transition:opacity var(--tt);}
.icard:hover .ic-acts{opacity:1;}
.ib{background:none;border:none;cursor:pointer;font-size:14px;color:var(--go);padding:4px;border-radius:var(--r);transition:all var(--tt);}
.ib:hover{color:var(--br-d);background:var(--cr-d);}
.ib.del:hover{color:var(--red);}

/* Section divider */
.sec-div{height:1px;background:var(--bd);margin:14px 0;}
.sec-lbl{font-family:var(--fd);font-size:9px;font-weight:700;color:var(--tx-l);text-transform:uppercase;letter-spacing:.1em;margin-bottom:8px;}

/* Empty */
.empty{display:flex;flex-direction:column;align-items:center;padding:36px 20px;text-align:center;gap:8px;color:var(--tx-l);}
.ei{font-size:34px;opacity:.3;}

/* Goal pill (sidebar) */
.goal-pill{display:flex;align-items:center;justify-content:space-between;padding:8px 11px;border-radius:var(--r);margin-bottom:6px;cursor:pointer;font-family:var(--fd);font-size:10px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:#fff;transition:all var(--tt);}
.goal-pill:hover{transform:translateX(2px);filter:brightness(1.1);}
.gp-cnt{width:20px;height:20px;background:rgba(255,255,255,.25);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;flex-shrink:0;}

/* Week goal blocks */
.wg-block{background:var(--bg-w);border:1px solid var(--bd);border-radius:var(--r);padding:9px 11px;margin-bottom:7px;}
.wg-lbl{font-family:var(--fd);font-size:9px;font-weight:700;color:var(--tx-l);text-transform:uppercase;letter-spacing:.1em;margin-bottom:3px;}
.wg-val{font-size:12px;color:var(--tx);min-height:22px;outline:none;border-radius:4px;padding:2px 4px;}
.wg-val:focus{background:var(--cr-d);}
.wg-val:empty::before{content:attr(data-ph);color:var(--tx-l);font-style:italic;font-size:11px;}

/* Template pill */
.tmpl-pill{display:flex;align-items:center;justify-content:space-between;padding:8px 11px;border-radius:var(--r);margin-bottom:6px;background:var(--cr-d);border:1px solid var(--bd);font-family:var(--fd);font-size:10px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:var(--br);cursor:pointer;transition:all var(--tt);}
.tmpl-pill:hover{background:var(--go);color:#fff;}

/* ═══════════════════════ DASHBOARD ═══════════════════════ */
.dash-greet{margin-bottom:18px;}
.dg-date{font-size:11px;color:var(--tx-l);font-weight:600;text-transform:uppercase;letter-spacing:.07em;margin-bottom:6px;}
.dg-hello{font-family:var(--fd);font-size:22px;font-weight:900;color:var(--br-d);line-height:1.3;}
.dg-hello span{color:var(--go);}
.dash-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:18px;}
.dash-tile{background:var(--cr);border:1px solid var(--bd);border-radius:var(--rl);padding:18px 16px;cursor:pointer;transition:all var(--tt);display:flex;flex-direction:column;gap:8px;}
.dash-tile:hover{border-color:var(--go);transform:translateY(-2px);box-shadow:0 4px 16px var(--sh);}
.dt-ico{font-size:28px;}
.dt-lbl{font-family:var(--fd);font-size:14px;font-weight:700;color:var(--br-d);}
.dt-val{font-size:16px;color:var(--go);font-weight:700;}

/* ═══════════════════════ MIND MAP ═══════════════════════ */
.mm-wrap{flex:1;position:relative;overflow:hidden;background:var(--bg-w);}
.mm-svg{position:absolute;inset:0;pointer-events:none;overflow:visible;}
.mm-node{position:absolute;border-radius:var(--r);padding:8px 14px;font-family:var(--fd);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;cursor:grab;user-select:none;box-shadow:0 3px 12px rgba(0,0,0,.15);text-align:center;transition:box-shadow var(--tt),opacity var(--tt);}
.mm-node:active{cursor:grabbing;}
.mm-node:hover{box-shadow:0 5px 20px rgba(0,0,0,.25);}
.mm-node.sel{box-shadow:0 0 0 3px var(--go),0 5px 20px rgba(0,0,0,.2);}
.mm-node.type-root{background:var(--br-d);color:var(--go-l);font-size:13px;padding:14px 22px;border-radius:var(--rl);min-width:130px;}
.mm-node.type-goal{color:#fff;min-width:110px;}
.mm-node.type-project{background:var(--cr-d);color:var(--br-d);border:2px solid var(--go);min-width:100px;}
.mm-node.type-task{background:var(--bg-w);color:var(--tx);border:1px solid var(--bd-s);font-size:10px;font-weight:600;min-width:90px;}
.mm-node.type-task.done{opacity:.4;text-decoration:line-through;}
.mm-hint{position:absolute;bottom:10px;left:50%;transform:translateX(-50%);background:rgba(90,53,16,.8);color:var(--go-l);font-family:var(--fd);font-size:9px;font-weight:700;letter-spacing:.06em;padding:5px 16px;border-radius:var(--rf);pointer-events:none;white-space:nowrap;}
.mm-tb{position:absolute;top:10px;left:10px;display:flex;gap:6px;z-index:5;}
.mm-tb-btn{background:var(--br);color:var(--go-l);border:none;border-radius:var(--r);padding:6px 12px;font-family:var(--fd);font-size:9px;font-weight:700;letter-spacing:.06em;cursor:pointer;transition:all var(--tt);}
.mm-tb-btn:hover{background:var(--br-d);}
/* Context menu on canvas click */
.mm-ctx-menu{position:absolute;background:var(--bg-p);border:2px solid var(--bd-s);border-radius:var(--rl);padding:8px;z-index:20;min-width:160px;box-shadow:0 6px 24px var(--sh);}
.mm-ctx-item{display:block;width:100%;padding:8px 12px;background:none;border:none;text-align:left;font-family:var(--fd);font-size:11px;font-weight:700;color:var(--br-d);letter-spacing:.04em;cursor:pointer;border-radius:var(--r);transition:all var(--tt);}
.mm-ctx-item:hover{background:var(--go);color:#fff;}
.mm-ctx-item.danger:hover{background:var(--red);}

/* ═══════════════════════ MODAL ═══════════════════════ */
.m-ov{position:fixed;inset:0;background:rgba(60,30,0,.65);z-index:1000;display:flex;align-items:flex-end;justify-content:center;transition:opacity var(--tt);}
.m-ov.hidden{opacity:0;pointer-events:none;}
.m-box{background:var(--bg-p);border:2px solid var(--bd-s);border-radius:var(--rxl) var(--rxl) 0 0;width:100%;max-width:580px;max-height:94vh;display:flex;flex-direction:column;overflow:hidden;transition:transform var(--tt);}
.m-ov.hidden .m-box{transform:translateY(40px);}
.m-hd{display:flex;align-items:center;gap:10px;padding:14px 18px;border-bottom:2px dashed var(--bd);background:var(--br);}
.m-ttl{font-family:var(--fd);font-size:13px;font-weight:700;color:var(--go-l);letter-spacing:.08em;text-transform:uppercase;flex:1;}
.m-date-b{font-family:var(--fd);font-size:10px;color:rgba(255,255,255,.55);white-space:nowrap;}
.m-x{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);color:#fff;width:26px;height:26px;border-radius:50%;cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center;transition:all var(--tt);}
.m-x:hover{background:rgba(255,255,255,.25);}
.m-tabs{display:flex;background:var(--br-d);border-bottom:1px solid var(--bd);}
.m-tab{flex:1;padding:9px 6px;font-family:var(--fd);font-size:9px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:rgba(255,255,255,.45);border:none;background:none;cursor:pointer;border-bottom:2px solid transparent;transition:all var(--tt);}
.m-tab.on{color:var(--go-l);border-bottom-color:var(--go);}
.m-body{padding:16px 18px;overflow-y:auto;flex:1;}
.m-ft{display:flex;gap:8px;justify-content:flex-end;padding:12px 18px 16px;border-top:2px dashed var(--bd);}
.btn-sv{padding:10px 32px;background:var(--go);color:#fff;font-family:var(--fd);font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;border:none;border-radius:var(--rl);cursor:pointer;transition:all var(--tt);}
.btn-sv:hover{background:var(--go-d);transform:translateY(-1px);}
.btn-cl{padding:10px 20px;background:var(--cr-d);color:var(--br);font-family:var(--fd);font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;border:1px solid var(--bd-s);border-radius:var(--rl);cursor:pointer;transition:all var(--tt);}
.btn-cl:hover{background:var(--br);color:#fff;}

/* Task modal specifics */
.m-section{margin-bottom:14px;}
.m-section-ttl{font-family:var(--fd);font-size:9px;font-weight:700;color:var(--tx-l);text-transform:uppercase;letter-spacing:.1em;margin-bottom:7px;display:flex;align-items:center;gap:6px;}
.m-section-ttl::after{content:'';flex:1;height:1px;background:var(--bd);}
.fg{display:flex;flex-direction:column;gap:4px;margin-bottom:11px;}
.fl{font-family:var(--fd);font-size:9px;font-weight:700;color:var(--tx-l);text-transform:uppercase;letter-spacing:.08em;}
.inp,.txta,.sel{width:100%;background:var(--bg-w);border:1px solid var(--bd);color:var(--tx);border-radius:var(--r);padding:9px 12px;font-family:var(--fb);font-size:14px;transition:border-color var(--tt);outline:none;}
.inp:focus,.txta:focus,.sel:focus{border-color:var(--go);}
.txta{resize:vertical;min-height:80px;}
.sel option{background:var(--bg-w);}
.inp-row{display:flex;gap:8px;}
.inp-row .inp{flex:1;}
/* Priority selector */
.pri-row{display:flex;gap:8px;margin-top:4px;}
.pri-btn{flex:1;padding:7px;border-radius:var(--r);border:2px solid var(--bd);background:var(--bg-w);font-family:var(--fd);font-size:10px;font-weight:700;cursor:pointer;transition:all var(--tt);text-align:center;}
.pri-btn.on-high{background:rgba(192,64,48,.12);border-color:var(--red);color:var(--red);}
.pri-btn.on-med{background:rgba(200,150,62,.15);border-color:var(--go);color:var(--go-d);}
.pri-btn.on-low{background:rgba(74,138,74,.12);border-color:var(--grn);color:var(--grn);}
/* Subtasks */
.sub-list{display:flex;flex-direction:column;gap:6px;margin-top:6px;}
.sub-row{display:flex;gap:8px;align-items:center;}
.sub-row .inp{flex:1;}
.rm-sub{background:none;border:none;color:var(--tx-l);cursor:pointer;font-size:16px;padding:2px 4px;transition:color var(--tt);}
.rm-sub:hover{color:var(--red);}

<script type="module">

         signInWithPopup, signOut, onAuthStateChanged }

// ════ 🔧 FIREBASE CONFIG ════
const firebaseConfig = {

};

const fbApp=initializeApp(firebaseConfig);
const auth=getAuth(fbApp), db=getFirestore(fbApp);

const uc=col=>collection(db,"users",uid,col);
const ud=(col,id)=>doc(db,"users",uid,col,id);
const $=id=>document.getElementById(id);
const esc=s=>String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
const p2=n=>String(n).padStart(2,"0");
const dstr=d=>{if(!d)return"";const dt=d instanceof Date?d:d.toDate?d.toDate():new Date(d);return`${dt.getFullYear()}-${p2(dt.getMonth()+1)}-${p2(dt.getDate())}`;};
const fdt=d=>{if(!d)return"";const dt=d instanceof Date?d:d.toDate?d.toDate():new Date(d);return`${p2(dt.getDate())}.${p2(dt.getMonth()+1)}.${dt.getFullYear()}. ${p2(dt.getHours())}:${p2(dt.getMinutes())}`;};
const today=()=>dstr(new Date());
const isOv=d=>{if(!d)return false;const dt=d.toDate?d.toDate():new Date(d);return dt<new Date();};
async function sg(q){try{const s=await getDocs(q);return s.docs.map(d=>({id:d.id,...d.data()}));}catch(e){console.warn(e);return[];}}

const GCOLS=["#C06070","#A07840","#9060A0","#507860","#6060A0","#704040","#407060"];
const MONTHS=["Январь","Февраль","Март","Апрель","Май","Июнь","Июль","Август","Сентябрь","Октябрь","Ноябрь","Декабрь"];
const MGEN=["января","февраля","марта","апреля","мая","июня","июля","августа","сентября","октября","ноября","декабря"];

// ── STATE ──
let curTab="dashboard";
let planDate=new Date(); planDate.setHours(0,0,0,0);
let ideasDate=new Date(); ideasDate.setHours(0,0,0,0);
let diaryDate=new Date(); diaryDate.setHours(0,0,0,0);

let weekOff=0;
let calDate=new Date();
let modalSaveFn=null;

// ── TOAST ──
function toast(msg){const t=$("toast");t.textContent=msg;t.classList.remove("hidden");clearTimeout(t._t);t._t=setTimeout(()=>t.classList.add("hidden"),2600);}

// ═══════════════════════════════════════
//  MODAL SYSTEM
// ═══════════════════════════════════════
function openModal(title,bodyHtml,saveFn,tabs=null){
  const now=new Date();
  $("m-ttl").textContent=title;
  $("m-date").textContent=`${now.getDate()} ${MGEN[now.getMonth()]} ${now.getFullYear()}`;
  $("m-body").innerHTML=bodyHtml;
  modalSaveFn=saveFn;
  const tabsEl=$("m-tabs");
  if(tabs&&tabs.length){
    tabsEl.style.display="flex";
    tabsEl.innerHTML=tabs.map((t,i)=>`<button class="m-tab ${i===0?"on":""}" data-ti="${i}">${t.label}</button>`).join("");
    tabsEl.querySelectorAll(".m-tab").forEach(tb=>tb.addEventListener("click",()=>{
      tabsEl.querySelectorAll(".m-tab").forEach(x=>x.classList.remove("on"));
      tb.classList.add("on");
      tabs[parseInt(tb.dataset.ti)].render();
    }));
  } else {
    tabsEl.style.display="none";
    tabsEl.innerHTML="";
  }
  $("m-ov").classList.remove("hidden");
}
function closeModal(){$("m-ov").classList.add("hidden");$("m-body").innerHTML="";modalSaveFn=null;}
$("m-x").onclick=closeModal;
$("m-cancel").onclick=closeModal;
$("m-save").onclick=()=>{if(modalSaveFn)modalSaveFn();};
$("m-ov").addEventListener("click",e=>{if(e.target===$("m-ov"))closeModal();});

// Expose globally
window.openNewModal=openNewModal;
window.openCal=openCal;
window.closeCal=closeCal;

window.editIdea=editIdea;

// ═══════════════════════════════════════
//  TASK MODAL — rich form like reference
// ═══════════════════════════════════════
async function openNewModal(type="task", parentGoalId=null, parentProjId=null, fromTab=null){
  const tab=fromTab||curTab;

  // Modal title depends on tab and type
  const titles={
    task:{plan:"Новая задача",goals:"Новая задача",dashboard:"Новая задача",ideas:"Новая задача",diary:"Новая задача"},
    goal:{goals:"Новая цель",plan:"Новая цель",dashboard:"Новая цель",ideas:"Новая цель",diary:"Новая цель"},
    project:{goals:"Новый проект"},
    idea:{ideas:"Новая идея",dashboard:"Новая идея",plan:"Новая идея",diary:"Новая идея"},
    diary:{diary:"Новая запись в дневник",dashboard:"Новая запись",plan:"Новая запись",ideas:"Новая запись"},
    template:{diary:"Новый шаблон"},
  };
  const title=(titles[type]&&titles[type][tab])||("Новая "+type);

  if(type==="task") await buildTaskModal(title,parentGoalId,parentProjId);
  else if(type==="goal") await buildGoalModal(title);
  else if(type==="project") await buildProjectModal(title,parentGoalId);
  else if(type==="idea") buildIdeaModal(title);
  else if(type==="diary") await buildDiaryModal(title);
  else if(type==="template") buildTemplateModal(title);
}

async function buildTaskModal(title,defGoalId=null,defProjId=null){
  const [goals,projects]=await Promise.all([sg(uc("goals")),sg(uc("projects"))]);
  let selectedGoalId=defGoalId||"";
  let selectedProjId=defProjId||"";
  let priority="med";

  const render=()=>{
    const filteredProjs=selectedGoalId?projects.filter(p=>p.goalId===selectedGoalId):projects;
    $("m-body").innerHTML=`
      <div class="m-section"><div class="m-section-ttl">Основное</div>
        <div class="fg"><label class="fl">Название задачи *</label>
          <input class="inp" id="t-title" placeholder="Введите название задачи"/></div>
        <div class="fg"><label class="fl">Примечание</label>
          <textarea class="txta" id="t-note" placeholder="Введите примечание..."></textarea></div>
      </div>
      <div class="m-section"><div class="m-section-ttl">Привязка</div>
        <div class="fg"><label class="fl">Цель</label>
          <select class="sel" id="t-goal">
            <option value="">— Корневая (Мои цели) —</option>
            ${goals.map(g=>`<option value="${g.id}" ${g.id===selectedGoalId?"selected":""}>${esc(g.title)}</option>`).join("")}
          </select></div>
        <div class="fg"><label class="fl">Проект</label>
          <select class="sel" id="t-proj">
            <option value="">— Без проекта —</option>
            ${filteredProjs.map(p=>`<option value="${p.id}" ${p.id===selectedProjId?"selected":""}>${esc(p.name)}</option>`).join("")}
          </select></div>
      </div>
      <div class="m-section"><div class="m-section-ttl">Сроки</div>
        <div class="inp-row">
          <div class="fg" style="flex:1"><label class="fl">Начать</label><input class="inp" id="t-start" type="datetime-local"/></div>
          <div class="fg" style="flex:1"><label class="fl">Закончить до</label><input class="inp" id="t-dl" type="datetime-local"/></div>
        </div>
      </div>
      <div class="m-section"><div class="m-section-ttl">Приоритет</div>
        <div class="pri-row">
          <button class="pri-btn ${priority==="high"?"on-high":""}" onclick="setPri('high')">🔴 Высокий</button>
          <button class="pri-btn ${priority==="med"?"on-med":""}" onclick="setPri('med')">🟡 Средний</button>
          <button class="pri-btn ${priority==="low"?"on-low":""}" onclick="setPri('low')">🟢 Низкий</button>
        </div>
      </div>
      <div class="m-section"><div class="m-section-ttl">Подзадачи</div>
        <div id="sub-list" class="sub-list"></div>
        <button class="add-sub" onclick="addSub()">+ Добавить подзадачу</button>
      </div>`;

    // Goal change → filter projects
    $("t-goal")?.addEventListener("change",e=>{selectedGoalId=e.target.value;render();});
  };
  render();
  window.setPri=(p)=>{priority=p;render();const ti=setTimeout(()=>$("t-title")?.focus(),50);};

  openModal(title,$("m-body").innerHTML,async()=>{
    const titleVal=($("t-title")?.value||"").trim();
    if(!titleVal){alert("Введите название задачи");return;}
    const dl=$("t-dl")?.value, st=$("t-start")?.value;
    const goalId=$("t-goal")?.value||null;
    const projId=$("t-proj")?.value||null;
    const note=($("t-note")?.value||"").trim();
    const subs=[...$("sub-list")?.querySelectorAll("input")||[]].map(i=>i.value.trim()).filter(Boolean);
    await addDoc(uc("tasks"),{
      title:titleVal, note, goalId, projId, priority, subtasks:subs,
      date:today(),
      deadline:dl?Timestamp.fromDate(new Date(dl)):null,
      startDate:st?Timestamp.fromDate(new Date(st)):null,
      done:false, createdAt:serverTimestamp()
    });
    toast("Задача добавлена ✓");
    closeModal();
    await refreshAll();
  });
  // Re-render body after openModal (openModal replaces innerHTML)
  render();
}

async function buildGoalModal(title){
  openModal(title,`
    <div class="fg"><label class="fl">Название цели *</label>
      <input class="inp" id="g-title" placeholder="Чего хочу достичь?"/></div>
    <div class="fg"><label class="fl">Описание</label>
      <textarea class="txta" id="g-desc" placeholder="Описание цели..."></textarea></div>
    <div class="fg"><label class="fl">Дедлайн</label>
      <input class="inp" id="g-dl" type="date"/></div>`,
    async()=>{
      const t=($("g-title")?.value||"").trim();

function buildDayNav(selDate,datesWT,showAll,cid,onDay,onAll){
  const today2=new Date(); today2.setHours(0,0,0,0);
  const lbl=dstr(selDate)===dstr(today2)
    ?`Сегодня, ${selDate.getDate()} ${MGEN[selDate.getMonth()].charAt(0).toUpperCase()+MGEN[selDate.getMonth()].slice(1)}`
    :`${selDate.getDate()} ${MGEN[selDate.getMonth()]} ${selDate.getFullYear()}`;

  const mon=new Date(selDate);
  const dow=mon.getDay(); mon.setDate(mon.getDate()-(dow===0?6:dow-1)+weekOff*7);
  let btns="";
  for(let i=0;i<7;i++){
    const d=new Date(mon); d.setDate(mon.getDate()+i);
    const isSel=dstr(d)===dstr(selDate), hasDot=datesWT.has(dstr(d));
    btns+=`<button class="ds-day ${isSel?"on":""} ${hasDot?"has-dot":""}" data-date="${dstr(d)}">${d.getDate()}</button>`;
  }

  $(cid).innerHTML=`
    <div class="dn-row">
      <button class="dn-date" onclick="window._dc_${cid}()">${lbl}</button>
    </div>
    <div class="day-strip">
      <button class="ds-arr" id="${cid}-pw">←</button>
      ${btns}
      <button class="ds-arr" id="${cid}-nw">→</button>
      <button class="ds-all ${showAll?"on":""}" id="${cid}-all">Все</button>
    </div>`;

  window[`_dc_${cid}`]=()=>openCalForDate(d=>{onDay(d);});
  $(`${cid}-pw`).onclick=()=>{weekOff--;refreshAll();};
  $(`${cid}-nw`).onclick=()=>{weekOff++;refreshAll();};
  $(`${cid}-all`).onclick=()=>onAll();
  $(cid).querySelectorAll(".ds-day").forEach(b=>b.addEventListener("click",()=>{weekOff=0;onDay(new Date(b.dataset.date));}));
}

// ═══════════════════════════════════════
//  MIND MAP — proper drag & drop
// ═══════════════════════════════════════
let mmNodes=[], mmEdges=[], mmDrag=null, mmDragOff={x:0,y:0};
let mmPan={x:0,y:0}, mmScale=1, mmPanning=false, mmPanStart={x:0,y:0};
let mmSel=null, mmCtxMenu=null;

async function renderGoals(){
  $("tb-ttl").textContent="Цели";
  await renderSidebar("goals");

  const [goals,projects,tasks,posArr]=await Promise.all([
    sg(uc("goals")),sg(uc("projects")),sg(uc("tasks")),sg(uc("mmpos"))
  ]);
  const posMap={}; posArr.forEach(p=>{posMap[p.nid]={x:p.x,y:p.y};});

  const wrap=$("mm-wrap");
  const cw=wrap.offsetWidth||600, ch=wrap.offsetHeight||400;
  const cx=cw/2, cy=ch/2;

  // Build node tree
  mmNodes=[];mmEdges=[];

  // Root
  mmNodes.push({id:"root",type:"root",label:"МОИ ЦЕЛИ",
    x:posMap["root"]?.x??(cx-65), y:posMap["root"]?.y??(cy-25), w:130, h:50});

  goals.forEach((g,gi)=>{
    const angle=(2*Math.PI*gi/Math.max(goals.length,1))-(Math.PI/2);
    const r=Math.min(cw,ch)*0.28;
    const def={x:cx+r*Math.cos(angle)-60, y:cy+r*Math.sin(angle)-18};
    const pos=posMap[g.id]||def;
    mmNodes.push({id:g.id,type:"goal",label:g.title,
      x:pos.x,y:pos.y,w:120,h:36,color:GCOLS[gi%GCOLS.length]});
    mmEdges.push({from:"root",to:g.id});

    // Projects of this goal
    const gProjs=projects.filter(p=>p.goalId===g.id);
    gProjs.forEach((proj,pi)=>{
      const pa=angle+(pi-Math.floor(gProjs.length/2))*0.35;
      const pr=r*0.6;
      const pdef={x:pos.x+pr*Math.cos(pa)-50, y:pos.y+pr*Math.sin(pa)-15};
      const ppos=posMap[proj.id]||pdef;
      mmNodes.push({id:proj.id,type:"project",label:proj.name,
        x:ppos.x,y:ppos.y,w:110,h:32});
      mmEdges.push({from:g.id,to:proj.id});

      // Tasks of this project
      tasks.filter(t=>t.projId===proj.id).slice(0,4).forEach((t,ti)=>{
        const ta=pa+(ti-1)*0.3;
        const tr=pr*0.6;
        const tdef={x:ppos.x+tr*Math.cos(ta)-45, y:ppos.y+tr*Math.sin(ta)-14};
        const tpos=posMap[t.id]||tdef;
        mmNodes.push({id:t.id,type:"task",label:t.title,done:t.done,
          x:tpos.x,y:tpos.y,w:100,h:28});
        mmEdges.push({from:proj.id,to:t.id});
      });
    });

    // Tasks directly under goal (no project)
    tasks.filter(t=>t.goalId===g.id&&!t.projId).slice(0,5).forEach((t,ti)=>{
      const ta=angle+(ti-2)*0.25;
      const tr=r*0.65;
      const tdef={x:pos.x+tr*Math.cos(ta)-45, y:pos.y+tr*Math.sin(ta)-14};
      const tpos=posMap[t.id]||tdef;
      mmNodes.push({id:t.id,type:"task",label:t.title,done:t.done,
        x:tpos.x,y:tpos.y,w:100,h:28});
      mmEdges.push({from:g.id,to:t.id});
    });
  });

  // Tasks with no goal
  tasks.filter(t=>!t.goalId&&!t.projId).slice(0,6).forEach((t,ti)=>{
    const angle=Math.PI/4+ti*(Math.PI/8);
    const r2=Math.min(cw,ch)*0.25;
    const def={x:cx+r2*Math.cos(angle)-45, y:cy+r2*Math.sin(angle)-14};
    const tpos=posMap[t.id]||def;
    mmNodes.push({id:t.id,type:"task",label:t.title,done:t.done,
      x:tpos.x,y:tpos.y,w:100,h:28});
    mmEdges.push({from:"root",to:t.id});
  });

  drawMM();
  setupMMEvents(wrap);
}

function drawMM(){
  const wrap=$("mm-wrap");
  if(!wrap)return;
  // Remove old nodes
  wrap.querySelectorAll(".mm-node,.mm-ctx-menu").forEach(n=>n.remove());
  const svg=$("mm-svg");

  // Draw SVG edges
  let lines="";
  mmEdges.forEach(e=>{
    const fn=mmNodes.find(n=>n.id===e.from), tn=mmNodes.find(n=>n.id===e.to);
    if(!fn||!tn)return;
    const x1=(fn.x+fn.w/2)*mmScale+mmPan.x, y1=(fn.y+fn.h/2)*mmScale+mmPan.y;
    const x2=(tn.x+tn.w/2)*mmScale+mmPan.x, y2=(tn.y+tn.h/2)*mmScale+mmPan.y;
    const mx=(x1+x2)/2;
    const isDashed=tn.type==="task";
    lines+=`<path d="M${x1},${y1} C${mx},${y1} ${mx},${y2} ${x2},${y2}" stroke="${isDashed?"rgba(123,79,30,.25)":"rgba(123,79,30,.55)"}" stroke-width="${tn.type==="goal"?2:1.5}" fill="none" ${isDashed?'stroke-dasharray="4,3"':''}/>`;
  });
  svg.innerHTML=lines;

  // Draw nodes
  mmNodes.forEach(n=>{
    const el=document.createElement("div");
    el.className=`mm-node type-${n.type}${n.id===mmSel?" sel":""}${n.done?" done":""}`;
    el.dataset.id=n.id;
    el.textContent=n.label;
    if(n.type==="goal"&&n.color) el.style.background=n.color;
    el.style.left=(n.x*mmScale+mmPan.x)+"px";
    el.style.top=(n.y*mmScale+mmPan.y)+"px";
    el.style.width=(n.w*mmScale)+"px";
    el.style.fontSize=(n.type==="root"?13:n.type==="task"?10:11)*mmScale+"px";
    wrap.appendChild(el);

    // Mouse drag
    el.addEventListener("mousedown",e=>{
      e.stopPropagation();
      if(e.detail===2)return; // let dblclick handle
      mmDrag=n; mmDragOff={x:e.clientX-n.x*mmScale-mmPan.x, y:e.clientY-n.y*mmScale-mmPan.y};
    });
    // Touch drag
    el.addEventListener("touchstart",e=>{
      e.stopPropagation();
      const t2=e.touches[0];
      mmDrag=n; mmDragOff={x:t2.clientX-n.x*mmScale-mmPan.x, y:t2.clientY-n.y*mmScale-mmPan.y};
    },{passive:true});
    // Single click = select + show actions
    el.addEventListener("click",e=>{e.stopPropagation();selectMMNode(n,e);});
    // Double click = add child
    el.addEventListener("dblclick",e=>{e.stopPropagation();addMMChild(n);});
  });
}

function setupMMEvents(wrap){
  // Avoid double binding
  const oldWrap=wrap.cloneNode(false);
  // Instead just manage via window events (already set up once per session)
  if(wrap._mmBound) return;
  wrap._mmBound=true;

  // Pan on canvas mousedown
  wrap.addEventListener("mousedown",e=>{
    if(e.target===wrap||e.target===$("mm-svg")){
      closeMMCtx();
      mmPanning=true; mmPanStart={x:e.clientX-mmPan.x, y:e.clientY-mmPan.y};
      wrap.style.cursor="grabbing";
    }
  });

  // Canvas click = context menu
  wrap.addEventListener("click",e=>{
    if(e.target===wrap||e.target===$("mm-svg")){
      closeMMCtx(); mmSel=null; drawMM();
      showMMCtxMenu(e.clientX,e.clientY,null,e);
    }
  });

  // Scroll = zoom
  wrap.addEventListener("wheel",e=>{
    e.preventDefault();
    const delta=e.deltaY<0?0.1:-0.1;
    const newScale=Math.max(0.4,Math.min(2.5,mmScale+delta));
    const rect=wrap.getBoundingClientRect();
    const mx=e.clientX-rect.left, my=e.clientY-rect.top;
    mmPan.x=mx-(mx-mmPan.x)*(newScale/mmScale);
    mmPan.y=my-(my-mmPan.y)*(newScale/mmScale);
    mmScale=newScale; drawMM();
  },{passive:false});

  // Two-finger pinch (trackpad/mobile)
  let lastPinchDist=0;
  wrap.addEventListener("touchstart",e=>{
    if(e.touches.length===2){
      lastPinchDist=Math.hypot(e.touches[0].clientX-e.touches[1].clientX, e.touches[0].clientY-e.touches[1].clientY);
    }
  },{passive:true});
  wrap.addEventListener("touchmove",e=>{
    if(e.touches.length===2&&lastPinchDist>0){
      e.preventDefault();
      const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX, e.touches[0].clientY-e.touches[1].clientY);
      const ratio=d/lastPinchDist;
      mmScale=Math.max(0.4,Math.min(2.5,mmScale*ratio));
      lastPinchDist=d; drawMM();
    }
  },{passive:false});
}

window.addEventListener("mousemove",e=>{
  if(mmDrag){
    mmDrag.x=(e.clientX-mmDragOff.x-mmPan.x)/mmScale;
    mmDrag.y=(e.clientY-mmDragOff.y-mmPan.y)/mmScale;
    drawMM();
  } else if(mmPanning){
    mmPan={x:e.clientX-mmPanStart.x, y:e.clientY-mmPanStart.y}; drawMM();
    document.getElementById("mm-wrap")?.style && (document.getElementById("mm-wrap").style.cursor="grabbing");
  }
});
window.addEventListener("mouseup",async e=>{
  if(mmDrag){
    const n=mmDrag; mmDrag=null;
    const posArr=await sg(uc("mmpos"));
    const ex=posArr.find(p=>p.nid===n.id);
    if(ex) await updateDoc(ud("mmpos",ex.id),{x:n.x,y:n.y});
    else await addDoc(uc("mmpos"),{nid:n.id,x:n.x,y:n.y});
    document.getElementById("mm-wrap")&&(document.getElementById("mm-wrap").style.cursor="");
  }
  if(mmPanning){mmPanning=false; document.getElementById("mm-wrap")&&(document.getElementById("mm-wrap").style.cursor="");}
});
window.addEventListener("touchend",async()=>{
  if(mmDrag){const n=mmDrag;mmDrag=null;const pa=await sg(uc("mmpos"));const ex=pa.find(p=>p.nid===n.id);if(ex)await updateDoc(ud("mmpos",ex.id),{x:n.x,y:n.y});else await addDoc(uc("mmpos"),{nid:n.id,x:n.x,y:n.y});}
});
window.addEventListener("touchmove",e=>{
  if(mmDrag&&e.touches.length===1){const t=e.touches[0];mmDrag.x=(t.clientX-mmDragOff.x-mmPan.x)/mmScale;mmDrag.y=(t.clientY-mmDragOff.y-mmPan.y)/mmScale;drawMM();e.preventDefault();}
},{passive:false});

// Context menu
function showMMCtxMenu(cx,cy,node,originalEvent){
  closeMMCtx();
  const wrap=$("mm-wrap"); if(!wrap)return;
  const rect=wrap.getBoundingClientRect();
  const menu=document.createElement("div");
  menu.className="mm-ctx-menu"; menu.id="mm-ctx";
  menu.style.left=(cx-rect.left)+"px";
  menu.style.top=(cy-rect.top)+"px";

  if(!node){
    menu.innerHTML=`
      <button class="mm-ctx-item" onclick="closeMMCtx();openNewModal('task',null,null,'goals')">+ Задача</button>
      <button class="mm-ctx-item" onclick="closeMMCtx();openNewModal('goal',null,null,'goals')">+ Цель</button>
      <button class="mm-ctx-item" onclick="closeMMCtx();openNewModal('project',null,null,'goals')">+ Проект</button>`;
  } else if(node.type==="root"){
    menu.innerHTML=`
      <button class="mm-ctx-item" onclick="closeMMCtx();openNewModal('goal',null,null,'goals')">+ Добавить цель</button>`;
  } else if(node.type==="goal"){
    menu.innerHTML=`
      <button class="mm-ctx-item" onclick="closeMMCtx();openNewModal('task','${node.id}',null,'goals')">+ Задача</button>
      <button class="mm-ctx-item" onclick="closeMMCtx();openNewModal('project','${node.id}',null,'goals')">+ Проект</button>
      <button class="mm-ctx-item danger" onclick="closeMMCtx();delItem('goals','${node.id}')">Удалить цель</button>`;
  } else if(node.type==="project"){
    menu.innerHTML=`
      <button class="mm-ctx-item" onclick="closeMMCtx();openNewModal('task',null,'${node.id}','goals')">+ Задача</button>
      <button class="mm-ctx-item danger" onclick="closeMMCtx();delItem('projects','${node.id}')">Удалить проект</button>`;
  } else if(node.type==="task"){
    menu.innerHTML=`
      <button class="mm-ctx-item" onclick="closeMMCtx();editTask('${node.id}')">✎ Редактировать</button>
      <button class="mm-ctx-item" onclick="closeMMCtx();toggleTask('${node.id}')">✓ ${node.done?"Открыть":"Выполнить"}</button>
      <button class="mm-ctx-item danger" onclick="closeMMCtx();delItem('tasks','${node.id}')">Удалить</button>`;
  }
  wrap.appendChild(menu);
  mmCtxMenu=menu;
  // Close on outside click
  setTimeout(()=>document.addEventListener("click",closeMMCtxOnOutside),50);
}
function closeMMCtxOnOutside(e){if(mmCtxMenu&&!mmCtxMenu.contains(e.target)){closeMMCtx();document.removeEventListener("click",closeMMCtxOnOutside);}}
window.closeMMCtx=()=>{mmCtxMenu?.remove();mmCtxMenu=null;};

function selectMMNode(node,e){
  mmSel=node.id===mmSel?null:node.id;
  drawMM();
  if(mmSel) showMMCtxMenu(e.clientX,e.clientY,node,e);
}
function addMMChild(parent){
  if(parent.type==="root") openNewModal("goal",null,null,"goals");
  else if(parent.type==="goal") openNewModal("task",parent.id,null,"goals");
  else if(parent.type==="project") openNewModal("task",null,parent.id,"goals");
  else editTask(parent.id);
}

$("mm-reset").onclick=()=>{mmPan={x:0,y:0};mmScale=1;drawMM();};
$("mm-zoom-in").onclick=()=>{mmScale=Math.min(2.5,mmScale+0.2);drawMM();};
$("mm-zoom-out").onclick=()=>{mmScale=Math.max(0.4,mmScale-0.2);drawMM();};

//  CALENDAR
// ═══════════════════════════════════════
let calSelectCb=null;
async function openCal(cb=null){calSelectCb=cb||null;$("cal-ov").classList.remove("hidden");await renderCal();}
async function openCalForDate(cb){await openCal(cb);}
function closeCal(){$("cal-ov").classList.add("hidden");calSelectCb=null;}

async function renderCal(){
  const y=calDate.getFullYear(), m=calDate.getMonth();
  $("cal-mo").textContent=`${MONTHS[m]} ${y}`;
  const fd=new Date(y,m,1).getDay(), off=fd===0?6:fd-1;
  const days=new Date(y,m+1,0).getDate();
  const tod=new Date(); tod.setHours(0,0,0,0);
  const [tasks,ideas,diary]=await Promise.all([sg(uc("tasks")),sg(uc("ideas")),sg(uc("diary"))]);
  const allD=new Set([...tasks,...ideas,...diary].map(x=>x.date).filter(Boolean));

  let html=["Пн","Вт","Ср","Чт","Пт","Сб","Вс"].map(d=>`<div class="cal-dh">${d}</div>`).join("");
  for(let i=0;i<off;i++){const pd=new Date(y,m,-off+i+1);html+=`<div class="cal-cell other"><div class="cc-day">${pd.getDate()}</div></div>`;}
  for(let d=1;d<=days;d++){
    const dt=new Date(y,m,d), ds=dstr(dt), isTod=ds===dstr(tod);
    const dt2=tasks.filter(t=>t.date===ds);
    const evs=dt2.slice(0,2).map(t=>`<div class="cc-ev">▸ ${esc(t.title)}</div>`).join("");
    html+=`<div class="cal-cell ${isTod?"today":""}" data-date="${ds}"><div class="cc-day">${d}</div>${evs}${allD.has(ds)&&!dt2.length?'<div class="cc-ev">•</div>':""}</div>`;
  }
  $("cal-grid").innerHTML=html;
  $("cal-det").innerHTML="";

  $("cal-grid").querySelectorAll(".cal-cell:not(.other)").forEach(cell=>{
    cell.addEventListener("click",async()=>{
      $("cal-grid").querySelectorAll(".cal-cell").forEach(c=>c.classList.remove("sel"));
      cell.classList.add("sel");
      const ds=cell.dataset.date;
      if(calSelectCb){calSelectCb(new Date(ds));closeCal();return;}
      const dt=tasks.filter(t=>t.date===ds);
      const di=ideas.filter(x=>x.date===ds);
      const dd=diary.filter(x=>x.date===ds);
      let det=`<div style="font-family:var(--fd);font-size:11px;font-weight:700;color:var(--br);margin-bottom:8px;text-transform:uppercase;">${ds}</div>`;
      if(dt.length) det+=dt.map(t=>`<div style="font-size:12px;padding:3px 0;color:var(--br-d)">📋 ${esc(t.title)}</div>`).join("");
      if(di.length) det+=di.map(x=>`<div style="font-size:12px;padding:3px 0;color:var(--go-d)">💡 ${esc(x.title||x.text)}</div>`).join("");
      if(dd.length) det+=dd.map(x=>`<div style="font-size:12px;padding:3px 0;color:var(--tx-m)">📖 ${esc(x.title||x.text)}</div>`).join("");
      if(!dt.length&&!di.length&&!dd.length) det+=`<p style="font-size:12px;color:var(--tx-l)">Нет записей</p>`;
      $("cal-det").innerHTML=det;
    });
  });
}
$("cal-pm").onclick=()=>{calDate.setMonth(calDate.getMonth()-1);renderCal();};
$("cal-nm").onclick=()=>{calDate.setMonth(calDate.getMonth()+1);renderCal();};
$("cal-ov").addEventListener("click",e=>{if(e.target===$("cal-ov"))closeCal();});

async function switchTab(id){
  curTab=id; weekOff=0;
  document.querySelectorAll(".nt").forEach(t=>t.classList.toggle("on",t.dataset.tab===id));
  document.querySelectorAll(".mod").forEach(m=>m.classList.remove("on"));
  $("tab-"+id)?.classList.add("on");
  await renderSidebar(id);
  if(id==="dashboard") await renderDashboard();
  else if(id==="plan") await renderPlan();
  else if(id==="goals") await renderGoals();
  else if(id==="ideas") await renderIdeas();
  else if(id==="diary") await renderDiary();
  document.querySelector(`.sidebar.open`)&&closeSb();
}
