<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<title>Life-control</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Raleway:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
/* ════════════════════════════════════════
   CSS VARIABLES
════════════════════════════════════════ */
:root{
  --bg:#EDE3CC; --bg-s:#E4D8BB; --bg-p:#F5EDD8; --bg-w:#FDFAF4;
  --br:#7B4F1E; --br-d:#5A3510; --br-l:#A06A2E;
  --go:#C8963E; --go-l:#E4B96A; --go-d:#9A6F28;
  --cr:#F5EDD8; --cr-d:#EAE0C4;
  --red:#C04030; --grn:#4A8A4A;
  --tx:#3A2810; --tx-m:#7B5A30; --tx-l:#A08050;
  --bd:rgba(123,79,30,.2); --bd-s:rgba(123,79,30,.45);
  --sh:rgba(80,40,10,.12);
  --r:8px; --rl:14px; --rxl:20px; --rf:999px;
  --fd:'Cinzel',serif; --fb:'Raleway',sans-serif;
  --tt:170ms ease;
  --sb:280px; --tb:54px; --nb:56px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;background:var(--bg);}
body{color:var(--tx);font-family:var(--fb);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased;}

/* ════════════════════════════════════════
   SCREENS
════════════════════════════════════════ */
.scr{display:none;position:fixed;inset:0;z-index:1;}
.scr.on{display:flex;}

/* ════════════════════════════════════════
   AUTH
════════════════════════════════════════ */
#s-auth{align-items:center;justify-content:center;background:linear-gradient(145deg,#D4C090,#B89040);}
.auth-card{background:var(--bg-w);border:2px solid var(--bd-s);border-radius:var(--rxl);padding:44px 36px;width:100%;max-width:360px;text-align:center;box-shadow:0 12px 48px rgba(80,40,10,.3);}
.auth-badge{width:68px;height:68px;background:var(--br);color:#fff;font-family:var(--fd);font-size:20px;font-weight:700;border-radius:var(--rl);display:flex;align-items:center;justify-content:center;margin:0 auto 14px;box-shadow:0 4px 16px var(--sh);}
.auth-title{font-family:var(--fd);font-size:22px;font-weight:700;color:var(--br-d);margin-bottom:4px;}
.auth-sub{font-size:12px;color:var(--tx-m);margin-bottom:28px;}
.auth-btn{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:13px 20px;border-radius:var(--rl);border:none;font-family:var(--fd);font-size:12px;font-weight:600;letter-spacing:.06em;cursor:pointer;transition:all var(--tt);margin-bottom:10px;}
.ab-g{background:#4285F4;color:#fff;} .ab-g:hover{background:#3574e2;transform:translateY(-2px);}
.ab-y{background:#CC0000;color:#fff;} .ab-y:hover{background:#aa0000;transform:translateY(-2px);}
.auth-note{font-size:11px;color:var(--tx-l);margin-top:14px;}

/* ════════════════════════════════════════
   APP SHELL
════════════════════════════════════════ */
#s-app{flex-direction:row;}

/* TOPBAR mobile */
.topbar{display:none;position:fixed;top:0;left:0;right:0;height:var(--tb);background:var(--br-d);align-items:center;padding:0 14px;gap:12px;z-index:400;}
.tb-burger{background:none;border:none;cursor:pointer;padding:6px;display:flex;flex-direction:column;gap:5px;}
.tb-burger span{display:block;width:20px;height:2px;background:#fff;border-radius:2px;}
.tb-title{font-family:var(--fd);font-size:13px;font-weight:700;color:var(--go-l);flex:1;letter-spacing:.06em;}
.tb-new{background:var(--go);color:#fff;border:none;border-radius:var(--r);padding:6px 12px;font-family:var(--fd);font-size:10px;font-weight:700;letter-spacing:.06em;cursor:pointer;}

/* SIDEBAR */
.sidebar{width:var(--sb);min-width:var(--sb);background:var(--bg-p);border-right:2px dashed var(--bd);display:flex;flex-direction:column;z-index:200;overflow:hidden;flex-shrink:0;}
.sb-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:150;}
.sb-ov.on{display:block;}
.sb-profile{padding:20px 18px 16px;border-bottom:2px dashed var(--bd);text-align:center;}
.sb-month{font-family:var(--fd);font-size:10px;font-weight:600;color:var(--go-d);letter-spacing:.12em;text-transform:uppercase;margin-bottom:12px;}
.sb-av{width:68px;height:68px;border-radius:50%;background:var(--br);border:3px solid var(--go);margin:0 auto 10px;overflow:hidden;display:flex;align-items:center;justify-content:center;font-family:var(--fd);font-size:20px;font-weight:700;color:#fff;flex-shrink:0;}
.sb-av img{width:100%;height:100%;object-fit:cover;}
.sb-uname{display:block;font-family:var(--fd);font-size:11px;font-weight:700;color:var(--br-d);}
.sb-uemail{display:block;font-size:10px;color:var(--tx-l);margin-top:1px;}
.sb-new{display:block;width:100%;margin:12px 0 0;padding:11px 14px;background:var(--go);color:#fff;font-family:var(--fd);font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;border:none;border-radius:var(--r);cursor:pointer;transition:all var(--tt);}
.sb-new:hover{background:var(--go-l);transform:translateY(-1px);}
.sb-acts{display:flex;gap:8px;margin-top:8px;}
.sb-act{flex:1;padding:8px 6px;background:var(--br);color:var(--cr);font-family:var(--fd);font-size:9px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;border:none;border-radius:var(--r);cursor:pointer;transition:background var(--tt);}
.sb-act:hover{background:var(--br-d);}
.sb-extra{flex:1;overflow-y:auto;padding:14px 16px;}
.sb-sec{font-family:var(--fd);font-size:9px;font-weight:700;color:var(--tx-l);text-transform:uppercase;letter-spacing:.1em;margin-bottom:8px;padding-bottom:4px;border-bottom:1px solid var(--bd);}

/* MAIN AREA */
.main-area{flex:1;display:flex;flex-direction:column;overflow:hidden;}

/* TOP NAV TABS */
.top-nav{display:flex;background:var(--br-d);border-bottom:2px solid var(--go-d);flex-shrink:0;}
.nt{flex:1;padding:13px 6px;font-family:var(--fd);font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:rgba(255,255,255,.55);border:none;background:none;cursor:pointer;transition:all var(--tt);border-bottom:3px solid transparent;}
.nt:hover{color:rgba(255,255,255,.85);background:rgba(255,255,255,.07);}
.nt.on{color:var(--go-l);border-bottom-color:var(--go);}

/* MODULE WRAPPER */
.mwrap{flex:1;overflow:hidden;position:relative;}
.mod{display:none;position:absolute;inset:0;flex-direction:column;overflow:hidden;}
.mod.on{display:flex;}
.mod-hd{background:var(--cr);border-bottom:1px solid var(--bd);padding:12px 18px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.mod-title{font-family:var(--fd);font-size:12px;font-weight:700;color:var(--br);letter-spacing:.08em;text-transform:uppercase;}
.mod-body{flex:1;overflow-y:auto;padding:16px 18px 80px;}

/* ════════════════════════════════════════
   SHARED COMPONENTS
════════════════════════════════════════ */
/* Day strip */
.day-nav-row{display:flex;align-items:center;gap:8px;margin-bottom:12px;flex-wrap:wrap;}
.dn-date{flex:1;min-width:160px;background:var(--go);color:#fff;border-radius:var(--r);padding:8px 12px;font-family:var(--fd);font-size:10px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;cursor:pointer;transition:background var(--tt);}
.dn-date:hover{background:var(--go-d);}
.dn-cal{background:var(--go);color:#fff;border:none;border-radius:var(--r);padding:8px 12px;font-family:var(--fd);font-size:10px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;cursor:pointer;transition:background var(--tt);}
.dn-cal:hover{background:var(--go-d);}
.day-strip{display:flex;align-items:center;gap:4px;margin-bottom:16px;flex-wrap:nowrap;overflow-x:auto;padding-bottom:4px;}
.ds-arr{background:var(--go);color:#fff;width:26px;height:26px;min-width:26px;border-radius:50%;border:none;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;transition:background var(--tt);}
.ds-arr:hover{background:var(--go-d);}
.ds-btn{width:30px;height:30px;min-width:30px;border-radius:50%;background:var(--go);color:#fff;font-family:var(--fd);font-size:11px;font-weight:700;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all var(--tt);}
.ds-btn:hover{background:var(--go-d);}
.ds-btn.on{background:var(--br-d);box-shadow:0 2px 8px var(--sh);}
.ds-all{background:var(--cr-d);color:var(--br);font-family:var(--fd);font-size:9px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;border:1px solid var(--bd-s);border-radius:var(--r);padding:6px 8px;cursor:pointer;transition:all var(--tt);white-space:nowrap;}
.ds-all:hover,.ds-all.on{background:var(--br);color:#fff;}

/* Item card */
.icard{background:var(--cr);border:1px solid var(--bd);border-radius:var(--rl);padding:12px 14px;margin-bottom:10px;display:flex;align-items:flex-start;gap:10px;transition:all var(--tt);}
.icard:hover{border-color:var(--bd-s);box-shadow:0 2px 8px var(--sh);}
.icard.done{opacity:.5;} .icard.done .ic-title{text-decoration:line-through;}
.ic-chk{width:22px;height:22px;min-width:22px;border:2px solid var(--bd-s);border-radius:4px;background:var(--bg-w);cursor:pointer;display:flex;align-items:center;justify-content:center;margin-top:1px;transition:all var(--tt);}
.ic-chk:hover{border-color:var(--go);} .ic-chk.on{background:var(--go);border-color:var(--go);color:#fff;font-size:12px;}
.ic-body{flex:1;min-width:0;}
.ic-title{font-family:var(--fd);font-size:12px;font-weight:600;color:var(--br-d);text-transform:uppercase;letter-spacing:.04em;margin-bottom:3px;}
.ic-sub{font-size:11px;color:var(--go-d);font-weight:600;}
.ic-sub.ov{color:var(--red);}
.ic-text{font-size:12px;color:var(--tx-m);margin-top:4px;line-height:1.5;}
.ic-acts{display:flex;gap:4px;align-items:center;flex-shrink:0;}
.ib{background:none;border:none;cursor:pointer;font-size:14px;color:var(--go);padding:4px;border-radius:var(--r);transition:all var(--tt);}
.ib:hover{color:var(--br-d);background:var(--cr-d);}
.ib.del:hover{color:var(--red);}

/* Empty state */
.empty{display:flex;flex-direction:column;align-items:center;padding:40px 20px;text-align:center;gap:8px;color:var(--tx-l);}
.ei{font-size:36px;opacity:.3;}

/* Goal pill in sidebar */
.goal-pill{display:flex;align-items:center;justify-content:space-between;padding:9px 12px;border-radius:var(--r);margin-bottom:6px;cursor:pointer;font-family:var(--fd);font-size:10px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:#fff;transition:all var(--tt);}
.goal-pill:hover{transform:translateX(2px);}
.gp-cnt{width:22px;height:22px;background:rgba(255,255,255,.25);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;flex-shrink:0;}

/* Weeks goal blocks */
.wg-block{background:var(--bg-w);border:1px solid var(--bd);border-radius:var(--r);padding:10px 12px;margin-bottom:8px;}
.wg-lbl{font-family:var(--fd);font-size:9px;font-weight:700;color:var(--tx-l);text-transform:uppercase;letter-spacing:.1em;margin-bottom:4px;}
.wg-val{font-size:12px;color:var(--tx);min-height:24px;outline:none;border-radius:4px;padding:2px 4px;transition:background var(--tt);}
.wg-val:focus{background:var(--cr-d);}
.wg-val:empty::before{content:attr(data-ph);color:var(--tx-l);font-style:italic;}

/* Template pill */
.tmpl-pill{display:flex;align-items:center;justify-content:space-between;padding:9px 12px;border-radius:var(--r);margin-bottom:6px;background:var(--cr-d);border:1px solid var(--bd);font-family:var(--fd);font-size:10px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--br);cursor:pointer;transition:all var(--tt);}
.tmpl-pill:hover{background:var(--go);color:#fff;}

/* ════════════════════════════════════════
   DASHBOARD
════════════════════════════════════════ */
.dash-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px;}
.dash-tile{background:var(--cr);border:1px solid var(--bd);border-radius:var(--rl);padding:16px 14px;cursor:pointer;transition:all var(--tt);display:flex;flex-direction:column;gap:6px;min-height:90px;}
.dash-tile:hover{border-color:var(--go);background:var(--bg-w);transform:translateY(-2px);box-shadow:0 4px 14px var(--sh);}
.dt-ico{font-size:24px;} .dt-lbl{font-family:var(--fd);font-size:11px;font-weight:700;color:var(--br-d);}
.dt-val{font-size:12px;color:var(--go);font-weight:700;}
.dash-greeting{margin-bottom:20px;}
.dg-date{font-size:11px;color:var(--tx-l);font-weight:600;text-transform:uppercase;letter-spacing:.07em;margin-bottom:6px;}
.dg-hello{font-family:var(--fd);font-size:20px;font-weight:900;color:var(--br-d);line-height:1.3;}
.dg-hello span{color:var(--go);}

/* ════════════════════════════════════════
   MIND MAP CANVAS
════════════════════════════════════════ */
.mm-canvas{flex:1;position:relative;overflow:hidden;background:var(--bg-w);cursor:grab;user-select:none;}
.mm-canvas.grabbing{cursor:grabbing;}
.mm-svg{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;}
.mm-node{position:absolute;border-radius:var(--r);padding:8px 14px;font-family:var(--fd);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;cursor:move;user-select:none;box-shadow:0 3px 12px rgba(0,0,0,.15);min-width:100px;text-align:center;transition:box-shadow var(--tt);}
.mm-node:hover{box-shadow:0 5px 18px rgba(0,0,0,.25);}
.mm-node.selected{box-shadow:0 0 0 3px var(--go),0 5px 18px rgba(0,0,0,.2);}
.mm-node.type-root{background:var(--br-d);color:var(--go-l);font-size:13px;padding:12px 20px;border-radius:var(--rl);}
.mm-node.type-goal{background:var(--go);color:#fff;}
.mm-node.type-project{background:var(--cr-d);color:var(--br-d);border:2px solid var(--go);}
.mm-node.type-task{background:var(--bg-w);color:var(--tx);border:1px solid var(--bd-s);font-size:10px;font-weight:600;}
.mm-toolbar{position:absolute;top:10px;right:10px;display:flex;gap:6px;z-index:10;}
.mm-btn{background:var(--br);color:var(--go-l);border:none;border-radius:var(--r);padding:7px 12px;font-family:var(--fd);font-size:10px;font-weight:700;letter-spacing:.05em;cursor:pointer;transition:all var(--tt);}
.mm-btn:hover{background:var(--br-d);}
.mm-info{position:absolute;bottom:10px;left:50%;transform:translateX(-50%);background:rgba(90,53,16,.85);color:var(--go-l);font-family:var(--fd);font-size:9px;font-weight:700;letter-spacing:.06em;padding:5px 14px;border-radius:var(--rf);pointer-events:none;}

/* ════════════════════════════════════════
   MODAL (bottom sheet)
════════════════════════════════════════ */
.m-ov{position:fixed;inset:0;background:rgba(60,30,0,.6);z-index:1000;display:flex;align-items:flex-end;justify-content:center;transition:opacity var(--tt);}
.m-ov.hidden{opacity:0;pointer-events:none;}
.m-box{background:var(--bg-p);border:2px solid var(--bd-s);border-radius:var(--rxl) var(--rxl) 0 0;width:100%;max-width:560px;max-height:92vh;display:flex;flex-direction:column;overflow:hidden;transition:transform var(--tt);}
.m-ov.hidden .m-box{transform:translateY(40px);}
.m-hd{display:flex;align-items:center;gap:10px;padding:14px 18px;border-bottom:2px dashed var(--bd);background:var(--br);}
.m-ttl{font-family:var(--fd);font-size:13px;font-weight:700;color:var(--go-l);letter-spacing:.08em;text-transform:uppercase;flex:1;}
.m-date-badge{font-family:var(--fd);font-size:10px;color:rgba(255,255,255,.6);}
.m-x{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);color:#fff;width:26px;height:26px;border-radius:50%;cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center;transition:all var(--tt);}
.m-x:hover{background:rgba(255,255,255,.25);}
.m-body{padding:18px 20px;overflow-y:auto;flex:1;}

/* Type switcher */
.type-sw{display:flex;align-items:center;gap:8px;background:var(--cr-d);border:1px solid var(--bd);border-radius:var(--rl);padding:6px 10px;margin-bottom:16px;}
.tsw-arr{background:none;border:none;color:var(--go);font-size:18px;cursor:pointer;padding:2px 6px;border-radius:var(--r);transition:background var(--tt);}
.tsw-arr:hover{background:var(--bd);}
.tsw-lbl{flex:1;text-align:center;font-family:var(--fd);font-size:12px;font-weight:700;color:var(--br);letter-spacing:.08em;text-transform:uppercase;}

/* Form */
.fg{display:flex;flex-direction:column;gap:4px;margin-bottom:12px;}
.fl{font-family:var(--fd);font-size:9px;font-weight:700;color:var(--tx-l);text-transform:uppercase;letter-spacing:.08em;}
.inp,.txta,.sel{width:100%;background:var(--bg-w);border:1px solid var(--bd);color:var(--tx);border-radius:var(--r);padding:9px 12px;font-family:var(--fb);font-size:14px;transition:border-color var(--tt);outline:none;}
.inp:focus,.txta:focus,.sel:focus{border-color:var(--go);}
.txta{resize:vertical;min-height:80px;}
.sel option{background:var(--bg-w);}

/* Subtask rows */
.sub-list{display:flex;flex-direction:column;gap:6px;margin-top:6px;}
.sub-row{display:flex;gap:8px;align-items:center;}
.sub-row .inp{flex:1;}
.rm-sub{background:none;border:none;color:var(--tx-l);cursor:pointer;font-size:16px;padding:2px 4px;transition:color var(--tt);}
.rm-sub:hover{color:var(--red);}
.add-sub{background:none;border:1px dashed var(--bd-s);color:var(--br);border-radius:var(--r);padding:7px 12px;font-family:var(--fd);font-size:10px;font-weight:700;letter-spacing:.06em;cursor:pointer;transition:all var(--tt);margin-top:4px;width:100%;}
.add-sub:hover{background:var(--cr-d);}

/* Priority dots */
.priority-row{display:flex;gap:8px;margin-top:4px;}
.prio-dot{width:24px;height:24px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:all var(--tt);}
.prio-dot.on{transform:scale(1.2);border-color:var(--br-d);}

.m-ft{display:flex;gap:8px;justify-content:center;padding:14px 20px 18px;border-top:2px dashed var(--bd);}
.btn-save{padding:11px 36px;background:var(--go);color:#fff;font-family:var(--fd);font-size:12px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;border:none;border-radius:var(--rl);cursor:pointer;transition:all var(--tt);}
.btn-save:hover{background:var(--go-d);transform:translateY(-1px);}
.btn-cancel{padding:11px 22px;background:var(--cr-d);color:var(--br);font-family:var(--fd);font-size:12px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;border:1px solid var(--bd-s);border-radius:var(--rl);cursor:pointer;transition:all var(--tt);}
.btn-cancel:hover{background:var(--br);color:#fff;}

/* ════════════════════════════════════════
   CALENDAR OVERLAY
════════════════════════════════════════ */
.cal-ov{position:fixed;inset:0;background:rgba(60,30,0,.7);z-index:900;display:flex;align-items:center;justify-content:center;}
.cal-ov.hidden{display:none;}
.cal-box{background:var(--bg-p);border:2px solid var(--bd-s);border-radius:var(--rxl);width:100%;max-width:680px;max-height:92vh;display:flex;flex-direction:column;overflow:hidden;}
.cal-hd{background:var(--br-d);padding:14px 20px;display:flex;align-items:center;gap:12px;}
.cal-nav{background:none;border:none;color:var(--go-l);font-size:20px;cursor:pointer;padding:2px 8px;}
.cal-month{font-family:var(--fd);font-size:15px;font-weight:700;color:var(--go-l);flex:1;text-align:center;letter-spacing:.06em;}
.cal-close{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);color:#fff;width:26px;height:26px;border-radius:50%;cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;padding:14px;}
.cal-cell{min-height:70px;background:var(--bg-w);border:1px solid var(--bd);border-radius:var(--r);padding:6px;cursor:pointer;transition:all var(--tt);}
.cal-cell:hover{border-color:var(--go);background:var(--cr);}
.cal-cell.today{border-color:var(--go);background:var(--cr);}
.cal-cell.selected{border-color:var(--go-d);background:var(--go-d);} .cal-cell.selected .cc-day,.cal-cell.selected .cc-event{color:#fff!important;}
.cal-cell.other-m{opacity:.4;}
.cc-day{font-family:var(--fd);font-size:11px;font-weight:700;color:var(--br-d);margin-bottom:3px;}
.cc-event{font-size:9px;color:var(--go-d);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:1px;}
.cal-dh{font-family:var(--fd);font-size:9px;font-weight:700;color:var(--tx-l);text-align:center;text-transform:uppercase;letter-spacing:.06em;padding:6px 0;}
.cal-detail{padding:14px 18px;border-top:1px solid var(--bd);max-height:200px;overflow-y:auto;}
.cal-det-title{font-family:var(--fd);font-size:11px;font-weight:700;color:var(--br);margin-bottom:8px;text-transform:uppercase;letter-spacing:.06em;}

/* TOAST */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--br);color:var(--go-l);border:1px solid var(--go-d);border-radius:var(--rl);padding:9px 22px;font-family:var(--fd);font-size:11px;font-weight:700;letter-spacing:.06em;z-index:9999;transition:opacity var(--tt);box-shadow:0 4px 20px var(--sh);}
.toast.hidden{opacity:0;pointer-events:none;}

/* ════════════════════════════════════════
   RESPONSIVE — MOBILE
════════════════════════════════════════ */
@media(max-width:700px){
  .sidebar{position:fixed;top:0;left:0;bottom:0;transform:translateX(-100%);transition:transform var(--tt);box-shadow:4px 0 24px var(--sh);}
  .sidebar.open{transform:translateX(0);}
  .sb-ov.on{display:block;}
  .topbar{display:flex;}
  #s-app{padding-top:var(--tb);}
  .main-area{width:100%;}
  .top-nav{overflow-x:auto;-webkit-overflow-scrolling:touch;}
  .top-nav::-webkit-scrollbar{display:none;}
  .nt{padding:12px 10px;font-size:10px;white-space:nowrap;}
  .dash-grid{grid-template-columns:1fr 1fr;}
}
</style>
</head>

<!-- ════════════════════════════════════════
     FIREBASE + APP
════════════════════════════════════════ -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, doc, addDoc, updateDoc, deleteDoc,
         getDocs, query, where, orderBy, serverTimestamp, Timestamp }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { getAuth, GoogleAuthProvider, OAuthProvider,
         signInWithPopup, signOut, onAuthStateChanged }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

// ════ 🔧 ВСТАВЬ СВОИ ДАННЫЕ FIREBASE ════
const firebaseConfig = {
  apiKey:            "ТВОЙ_API_KEY",
  authDomain:        "ТВОЙ_PROJECT_ID.firebaseapp.com",
  projectId:         "ТВОЙ_PROJECT_ID",
  storageBucket:     "ТВОЙ_PROJECT_ID.appspot.com",
  messagingSenderId: "ТВОЙ_SENDER_ID",
  appId:             "ТВОЙ_APP_ID"
};
// ════════════════════════════════════════

const fbApp = initializeApp(firebaseConfig);
const auth  = getAuth(fbApp);
const db    = getFirestore(fbApp);
let uid = null;

const uc  = col => collection(db,"users",uid,col);
const ud  = (col,id) => doc(db,"users",uid,col,id);
const $   = id => document.getElementById(id);
const esc = s => String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
const p2  = n => String(n).padStart(2,"0");
const dstr= d => { if(!d)return""; const dt=d instanceof Date?d:d.toDate?d.toDate():new Date(d); return `${dt.getFullYear()}-${p2(dt.getMonth()+1)}-${p2(dt.getDate())}`; };
const fdt = d => { if(!d)return""; const dt=d instanceof Date?d:d.toDate?d.toDate():new Date(d); return `${p2(dt.getDate())}.${p2(dt.getMonth()+1)}.${dt.getFullYear()}. ${p2(dt.getHours())}:${p2(dt.getMinutes())}`; };
const todayStr = () => dstr(new Date());
const isOverdue = d => { if(!d)return false; const dt=d.toDate?d.toDate():new Date(d); return dt < new Date(); };

async function sget(q){ try{ const s=await getDocs(q); return s.docs.map(d=>({id:d.id,...d.data()})); }catch(e){console.warn(e);return [];} }

// ── STATE ──
let curTab = "dashboard";
let planDate = new Date(); planDate.setHours(0,0,0,0);
let ideasDate = new Date(); ideasDate.setHours(0,0,0,0);
let diaryDate = new Date(); diaryDate.setHours(0,0,0,0);
let showAllPlan=false, showAllIdeas=false, showAllDiary=false;
let weekOffset=0;
let calDate = new Date();
let entryTypeIdx=0;
let selectedGoalId=null;

const GCOLS=["#C06070","#A07840","#9060A0","#507860","#6060A0","#704040","#407060"];
const MONTHS=["Январь","Февраль","Март","Апрель","Май","Июнь","Июль","Август","Сентябрь","Октябрь","Ноябрь","Декабрь"];
const MGEN=["января","февраля","марта","апреля","мая","июня","июля","августа","сентября","октября","ноября","декабря"];
const DS=["Вс","Пн","Вт","Ср","Чт","Пт","Сб"];

// ── TOAST ──
function toast(msg){ const t=$("toast"); t.textContent=msg; t.classList.remove("hidden"); clearTimeout(t._t); t._t=setTimeout(()=>t.classList.add("hidden"),2800); }

// ── MODAL ──
function openModal(title,body){
  const now=new Date();
  $("m-ttl").textContent=title;
  $("m-date").textContent=`${now.getDate()} ${MGEN[now.getMonth()]} ${now.getFullYear()}`;
  $("m-bd").innerHTML=body;
  $("m-ft").innerHTML=`<button class="btn-cancel" id="m-cancel">Отмена</button><button class="btn-save" id="m-save">Сохранить</button>`;
  $("m-ov").classList.remove("hidden");
  $("m-cancel").onclick=closeModal;
}
function closeModal(){ $("m-ov").classList.add("hidden"); $("m-bd").innerHTML=""; }
$("m-x").onclick=closeModal;
$("m-ov").addEventListener("click",e=>{ if(e.target===$("m-ov"))closeModal(); });

// ── DAY NAV ──
function buildDayNav(selDate, datesWT, showAll, cid, onDay, onAll){
  const today=new Date(); today.setHours(0,0,0,0);
  const lbl = dstr(selDate)===dstr(today)
    ? `Сегодня, ${selDate.getDate()} ${MGEN[selDate.getMonth()].charAt(0).toUpperCase()+MGEN[selDate.getMonth()].slice(1)}`
    : `${selDate.getDate()} ${MGEN[selDate.getMonth()]} ${selDate.getFullYear()}`;

  const mon=new Date(selDate);
  const dow=mon.getDay(); mon.setDate(mon.getDate()-(dow===0?6:dow-1)+weekOffset*7);
  let btns="";
  for(let i=0;i<7;i++){
    const d=new Date(mon); d.setDate(mon.getDate()+i);
    const isSel=dstr(d)===dstr(selDate), hasDot=datesWT.has(dstr(d));
    btns+=`<button class="ds-btn ${isSel?"on":""}" data-date="${dstr(d)}" style="${hasDot?"box-shadow:0 0 0 2px rgba(192,64,48,.6)":""}">${d.getDate()}</button>`;
  }

  $(cid).innerHTML=`
    <div class="day-nav-row">
      <div class="dn-date" onclick="window._cal_${cid}()">${lbl}</div>
    </div>
    <div class="day-strip">
      <button class="ds-arr" id="${cid}-pw">←</button>
      ${btns}
      <button class="ds-arr" id="${cid}-nw">→</button>
      <button class="ds-all ${showAll?"on":""}" id="${cid}-all">Все</button>
    </div>`;

  window[`_cal_${cid}`]=()=>showCalForDate(d=>{onDay(d);});
  $(`${cid}-pw`).onclick=()=>{weekOffset--;renderTab(curTab);};
  $(`${cid}-nw`).onclick=()=>{weekOffset++;renderTab(curTab);};
  $(`${cid}-all`).onclick=()=>onAll();
  $(cid).querySelectorAll(".ds-btn").forEach(b=>b.addEventListener("click",()=>{
    weekOffset=0; onDay(new Date(b.dataset.date));
  }));
}

// ════════════════════════════════════════
//  DASHBOARD
// ════════════════════════════════════════
async function renderDashboard(){
  $("tb-title").textContent="Дашборд";
  const today=todayStr();
  const [tasks,ideas,goals,diary]=await Promise.all([
    sget(uc("tasks")), sget(uc("ideas")), sget(uc("goals")), sget(uc("diary"))
  ]);
  const todayTasks=tasks.filter(t=>t.date===today);
  const openToday=todayTasks.filter(t=>!t.done).length;
  const doneToday=todayTasks.filter(t=>t.done).length;
  const overdueTasks=tasks.filter(t=>!t.done&&t.deadline&&isOverdue(t.deadline)).length;
  const d=new Date();
  const gr=d.getHours()<12?"Доброе утро":d.getHours()<17?"Добрый день":"Добрый вечер";
  const fname=(($("sb-uname").textContent)||"друг").split(" ")[0];
  const WD=["воскресенье","понедельник","вторник","среда","четверг","пятница","суббота"];

  $("dash-body").innerHTML=`
    <div class="dash-greeting">
      <div class="dg-date">${WD[d.getDay()]}, ${d.getDate()} ${MGEN[d.getMonth()]} ${d.getFullYear()}</div>
      <div class="dg-hello">${gr},<br/><span>${esc(fname)}</span> 👋</div>
    </div>
    <div class="dash-grid">
      <div class="dash-tile" onclick="switchTab('plan')">
        <div class="dt-ico">📋</div>
        <div class="dt-lbl">Задачи сегодня</div>
        <div class="dt-val">${openToday} открытых · ${doneToday} готово</div>
      </div>
      <div class="dash-tile" onclick="switchTab('goals')">
        <div class="dt-ico">🎯</div>
        <div class="dt-lbl">Цели</div>
        <div class="dt-val">${goals.length} целей</div>
      </div>
      <div class="dash-tile" onclick="switchTab('ideas')">
        <div class="dt-ico">💡</div>
        <div class="dt-lbl">Идеи</div>
        <div class="dt-val">${ideas.length} записей</div>
      </div>
      <div class="dash-tile" onclick="switchTab('diary')">
        <div class="dt-ico">📖</div>
        <div class="dt-lbl">Дневник</div>
        <div class="dt-val">${diary.length} записей</div>
      </div>
    </div>
    ${overdueTasks?`<div style="background:rgba(192,64,48,.1);border:1px solid rgba(192,64,48,.35);border-radius:var(--r);padding:10px 14px;margin-bottom:16px;font-size:12px;color:var(--red)">⚠ Просрочено задач: ${overdueTasks}</div>`:""}
    <div style="font-family:var(--fd);font-size:10px;font-weight:700;color:var(--tx-l);text-transform:uppercase;letter-spacing:.1em;margin-bottom:10px;">Задачи на сегодня</div>
    ${todayTasks.length
      ? todayTasks.map(t=>`<div class="icard ${t.done?"done":""}">
          <div class="ic-chk ${t.done?"on":""}" onclick="toggleTask('${t.id}')">${t.done?"✓":""}</div>
          <div class="ic-body"><div class="ic-title">${esc(t.title)}</div>${t.deadline?`<div class="ic-sub ${isOverdue(t.deadline)?"ov":""}">${fdt(t.deadline)}</div>`:""}</div>
        </div>`).join("")
      : '<div class="empty"><div class="ei">📋</div><p>На сегодня задач нет</p></div>'}`;
}

// ════════════════════════════════════════
//  ПЛАН ДНЯ
// ════════════════════════════════════════
async function renderPlan(){
  $("tb-title").textContent="План дня";
  const all=await sget(uc("tasks"));
  const datesWT=new Set(all.filter(x=>x.date).map(x=>x.date));

  // sidebar: week goals + goals list
  const goals=await sget(uc("goals"));
  const wgArr=await sget(uc("weekgoals"));
  const wg=wgArr[0]||{id:null};
  renderSidebarGoals(goals,"plan");
  const sbEx=$("sb-extra");
  const goalsHtml=goals.length
    ? goals.map((g,i)=>`<div class="goal-pill" style="background:${GCOLS[i%GCOLS.length]}">${esc(g.title)}<span class="gp-cnt">${all.filter(t=>t.goalId===g.id).length}</span></div>`).join("")
    : '<p style="font-size:11px;color:var(--tx-l)">Целей нет</p>';
  sbEx.innerHTML=`
    <div class="sb-sec">Цели</div>
    ${goalsHtml}
    <div style="margin-top:16px">
      <div class="sb-sec">Цель недели</div>
      <div class="wg-block"><div class="wg-val" contenteditable id="wg-week" data-ph="Введите цель..." onblur="saveWG('week',this.textContent,'${wg.id||""}')">${esc(wg.week||"")}</div></div>
      <div class="sb-sec">Цель на месяц</div>
      <div class="wg-block"><div class="wg-val" contenteditable id="wg-month" data-ph="Введите цель..." onblur="saveWG('month',this.textContent,'${wg.id||""}')">${esc(wg.month||"")}</div></div>
      <div class="sb-sec">Цель на год</div>
      <div class="wg-block"><div class="wg-val" contenteditable id="wg-year" data-ph="Введите цель..." onblur="saveWG('year',this.textContent,'${wg.id||""}')">${esc(wg.year||"")}</div></div>
    </div>`;

  const body=$("plan-body");
  body.innerHTML=`<div id="plan-daynav"></div><div id="plan-list"></div><div id="plan-done"></div>`;

  buildDayNav(planDate,datesWT,showAllPlan,"plan-daynav",
    d=>{planDate=d;showAllPlan=false;renderPlan();},
    ()=>{showAllPlan=!showAllPlan;renderPlan();});

  const items=showAllPlan?all:all.filter(t=>t.date===dstr(planDate));
  const open=items.filter(t=>!t.done).sort((a,b)=>(a.deadline||"")>(b.deadline||"")?1:-1);
  const done=items.filter(t=>t.done);

  const renderT=t=>{
    const dl=t.deadline;
    const ov=dl&&isOverdue(dl);
    const goalName=goals.find(g=>g.id===t.goalId)?.title||"";
    const subs=t.subtasks?.length?`<div style="margin-top:6px">${t.subtasks.map(s=>`<div style="font-size:11px;color:var(--tx-m);padding:2px 0 2px 12px;border-left:2px solid var(--bd)">— ${esc(s)}</div>`).join("")}</div>`:"";
    return`<div class="icard ${t.done?"done":""}">
      <div class="ic-chk ${t.done?"on":""}" onclick="toggleTask('${t.id}')">${t.done?"✓":""}</div>
      <div class="ic-body">
        <div class="ic-title">${esc(t.title)}</div>
        ${dl?`<div class="ic-sub ${ov?"ov":""}">${fdt(dl)}</div>`:""}
        ${goalName?`<div style="font-size:10px;color:var(--tx-l)">↳ ${esc(goalName)}</div>`:""}
        ${subs}
      </div>
      <div class="ic-acts">
        <button class="ib" onclick="editTaskModal('${t.id}')">✎</button>
        <button class="ib del" onclick="delItem('tasks','${t.id}','plan')">🗑</button>
      </div>
    </div>`;
  };

  $("plan-list").innerHTML=open.length?open.map(renderT).join(""):'<div class="empty"><div class="ei">📋</div><p>Задач нет. Нажмите «Новая запись»</p></div>';

  if(done.length){
    $("plan-done").innerHTML=`<div style="height:1px;background:var(--bd);margin:14px 0;"></div>
      <div style="font-family:var(--fd);font-size:9px;font-weight:700;color:var(--tx-l);text-transform:uppercase;letter-spacing:.1em;margin-bottom:10px;">Выполнено (${done.length})</div>
      ${done.map(renderT).join("")}`;
  }

  // Fab

let mmNodes=[], mmEdges=[], mmDragging=null, mmDragOff={x:0,y:0}, mmPan={x:0,y:0}, mmScale=1;
let mmSelected=null, mmPanning=false, mmPanStart={x:0,y:0};

async function renderGoals(){
  $("tb-title").textContent="Цели";
  const goals=await sget(uc("goals"));
  renderSidebarGoals(goals,"goals");

  // Load or init node positions
  const posArr=await sget(uc("mmpositions"));
  const posMap={}; posArr.forEach(p=>{ posMap[p.nodeId]=p; });

  // Build nodes
  const canvas=$("mm-canvas");
  const cw=canvas.offsetWidth||600, ch=canvas.offsetHeight||400;

  // Root node
  mmNodes=[{id:"root",type:"root",label:"МОИ ЦЕЛИ",x:cw/2-60,y:ch/2-25,w:120,h:50}];
  mmEdges=[];

  const goalItems=await sget(uc("tasks"));
  goals.forEach((g,gi)=>{
    const angle=(2*Math.PI*gi/Math.max(goals.length,1))-(Math.PI/2);
    const r=Math.min(cw,ch)*0.3;
    const pos=posMap[g.id]||{x:cw/2+r*Math.cos(angle)-60,y:ch/2+r*Math.sin(angle)-18};
    mmNodes.push({id:g.id,type:"goal",label:g.title,x:pos.x,y:pos.y,w:120,h:36,color:GCOLS[gi%GCOLS.length]});
    mmEdges.push({from:"root",to:g.id});

    // Tasks under this goal
    const gTasks=goalItems.filter(t=>t.goalId===g.id).slice(0,5);
    gTasks.forEach((t,ti)=>{
      const ta=angle+(ti-Math.floor(gTasks.length/2))*0.3;
      const tr=r*0.65;
      const tpos=posMap[t.id]||{x:pos.x+tr*Math.cos(ta),y:pos.y+tr*Math.sin(ta)};
      mmNodes.push({id:t.id,type:"task",label:t.title,x:tpos.x,y:tpos.y,w:110,h:30,done:t.done});
      mmEdges.push({from:g.id,to:t.id});
    });
  });

  drawMM();
}

function drawMM(){
  const canvas=$("mm-canvas");
  // Remove old node divs
  canvas.querySelectorAll(".mm-node").forEach(n=>n.remove());
  const svg=$("mm-svg");
  // Draw edges
  let lines="";
  mmEdges.forEach(e=>{
    const from=mmNodes.find(n=>n.id===e.from);
    const to=mmNodes.find(n=>n.id===e.to);
    if(!from||!to)return;
    const x1=from.x+from.w/2+mmPan.x, y1=from.y+from.h/2+mmPan.y;
    const x2=to.x+to.w/2+mmPan.x,   y2=to.y+to.h/2+mmPan.y;
    const mx=(x1+x2)/2;
    lines+=`<path d="M${x1},${y1} C${mx},${y1} ${mx},${y2} ${x2},${y2}" stroke="${to.type==="task"?"rgba(123,79,30,.3)":"rgba(123,79,30,.6)"}" stroke-width="${to.type==="task"?"1.5":"2"}" fill="none" stroke-dasharray="${to.type==="task"?"4,3":"none"}"/>`;
  });
  svg.innerHTML=lines;

  // Draw nodes
  mmNodes.forEach(n=>{
    const el=document.createElement("div");
    el.className=`mm-node type-${n.type} ${n.id===mmSelected?"selected":""}`;
    el.dataset.id=n.id;
    el.textContent=n.label;
    if(n.type==="goal") el.style.background=n.color;
    if(n.done) el.style.opacity="0.5";
    el.style.left=(n.x+mmPan.x)+"px";
    el.style.top=(n.y+mmPan.y)+"px";
    el.style.width=n.w+"px";
    canvas.appendChild(el);

    // Drag
    el.addEventListener("mousedown",e=>{ e.stopPropagation(); startDrag(e,n); });
    el.addEventListener("touchstart",e=>{ e.stopPropagation(); startDrag(e.touches[0],n); },{passive:true});

    // Single click = select
    el.addEventListener("click",e=>{ e.stopPropagation(); selectNode(n); });

    // Double click = add child
    el.addEventListener("dblclick",e=>{ e.stopPropagation(); addChildNode(n); });
  });
}

function startDrag(e,node){
  mmDragging=node;
  mmDragOff={x:e.clientX-node.x-mmPan.x, y:e.clientY-node.y-mmPan.y};
}

function selectNode(node){
  mmSelected=node.id===mmSelected?null:node.id;
  drawMM();
  if(mmSelected&&node.type!=="root"){
    // show context in sidebar
    const extra=$("sb-extra");
    const isGoal=node.type==="goal";
    extra.insertAdjacentHTML("afterbegin",`<div id="mm-ctx" style="background:var(--bg-w);border:1px solid var(--bd);border-radius:var(--r);padding:10px;margin-bottom:10px">
      <div style="font-family:var(--fd);font-size:10px;font-weight:700;color:var(--br);margin-bottom:8px;text-transform:uppercase">${esc(node.label)}</div>
      ${isGoal?`<button style="width:100%;margin-bottom:6px;" class="sb-new" onclick="newEntry('Задача','${node.id}')">+ Добавить задачу</button>`:""}
      <button style="width:100%;background:rgba(192,64,48,.15);border:1px solid rgba(192,64,48,.3);color:var(--red);padding:7px;border-radius:var(--r);font-family:var(--fd);font-size:10px;font-weight:700;letter-spacing:.05em;cursor:pointer" onclick="delMMNode('${node.id}','${node.type}')">Удалить</button>
    </div>`);
  } else {
    $("mm-ctx")?.remove();
  }
}

window.delMMNode=async(id,type)=>{
  if(!confirm("Удалить?"))return;
  if(type==="goal") await deleteDoc(ud("goals",id));
  else await deleteDoc(ud("tasks",id));
  toast("Удалено"); mmSelected=null; $("mm-ctx")?.remove(); renderGoals();
};

async function addChildNode(parentNode){
  if(parentNode.type==="root"){ newEntry("Цель"); return; }
  if(parentNode.type==="goal"){ newEntry("Задача",parentNode.id); return; }
}

// Canvas pan
const canvas=$("mm-canvas");
canvas.addEventListener("mousedown",e=>{
  if(e.target===canvas||e.target===$("mm-svg")){ mmPanning=true; mmPanStart={x:e.clientX-mmPan.x,y:e.clientY-mmPan.y}; canvas.classList.add("grabbing"); }
});
window.addEventListener("mousemove",e=>{
  if(mmDragging){ mmDragging.x=e.clientX-mmDragOff.x-mmPan.x; mmDragging.y=e.clientY-mmDragOff.y-mmPan.y; drawMM(); }
  else if(mmPanning){ mmPan={x:e.clientX-mmPanStart.x,y:e.clientY-mmPanStart.y}; drawMM(); }
});
window.addEventListener("mouseup",async e=>{
  if(mmDragging){
    // Save position
    const n=mmDragging;
    const posArr=await sget(uc("mmpositions"));
    const existing=posArr.find(p=>p.nodeId===n.id);
    if(existing) await updateDoc(ud("mmpositions",existing.id),{x:n.x,y:n.y});
    else await addDoc(uc("mmpositions"),{nodeId:n.id,x:n.x,y:n.y,createdAt:serverTimestamp()});
    mmDragging=null;
  }
  if(mmPanning){ mmPanning=false; canvas.classList.remove("grabbing"); }
});

// Touch drag
canvas.addEventListener("touchmove",e=>{
  if(mmDragging){ const t=e.touches[0]; mmDragging.x=t.clientX-mmDragOff.x-mmPan.x; mmDragging.y=t.clientY-mmDragOff.y-mmPan.y; drawMM(); e.preventDefault(); }
},{passive:false});
canvas.addEventListener("touchend",async()=>{ if(mmDragging){const n=mmDragging;mmDragging=null;const posArr=await sget(uc("mmpositions"));const ex=posArr.find(p=>p.nodeId===n.id);if(ex)await updateDoc(ud("mmpositions",ex.id),{x:n.x,y:n.y});else await addDoc(uc("mmpositions"),{nodeId:n.id,x:n.x,y:n.y,createdAt:serverTimestamp()});} });

async function saveEntry(type,today,forceGoalId){
  if(type==="Идея"){
    const title=($("f-title")?.value||"").trim(), text=($("f-text")?.value||"").trim();
    if(!title&&!text){alert("Введите текст или заголовок");return;}
    const dl=$("f-dl")?.value;
    await addDoc(uc("ideas"),{title,text,date:today,deadline:dl?Timestamp.fromDate(new Date(dl)):null,createdAt:serverTimestamp()});
    toast("Идея сохранена ✦"); closeModal(); renderIdeas();

  } else if(type==="Цель"){
    const title=($("f-title")?.value||"").trim();
    if(!title){alert("Введите название цели");return;}
    const gRef=await addDoc(uc("goals"),{title,createdAt:serverTimestamp()});
    const task=($("f-task")?.value||"").trim();
    const subs=[...$("sub-list")?.querySelectorAll("input")||[]].map(i=>i.value.trim()).filter(Boolean);
    if(task) await addDoc(uc("tasks"),{title:task,goalId:gRef.id,date:today,done:false,subtasks:subs,createdAt:serverTimestamp()});
    toast("Цель создана ✦"); closeModal(); renderGoals();

  } else if(type==="Задача"){
    const title=($("f-title")?.value||"").trim();
    if(!title){alert("Введите название");return;}
    const dl=$("f-dl")?.value, goalId=$("f-goal")?.value||forceGoalId||null;
    const note=($("f-note")?.value||"").trim();
    const subs=[...$("sub-list")?.querySelectorAll("input")||[]].map(i=>i.value.trim()).filter(Boolean);
    await addDoc(uc("tasks"),{title,date:today,deadline:dl?Timestamp.fromDate(new Date(dl)):null,goalId,note,subtasks:subs,done:false,createdAt:serverTimestamp()});
    toast("Задача добавлена ✦"); closeModal(); renderPlan();

  } else if(type==="Запись в дневник"){
    const title=($("f-title")?.value||"").trim(), text=($("f-text")?.value||"").trim();
    if(!title&&!text){alert("Введите текст");return;}
    const goalId=$("f-goal")?.value||null;
    const now=new Date();
    await addDoc(uc("diary"),{title,text,goalId,date:today,time:`${p2(now.getHours())}:${p2(now.getMinutes())}`,createdAt:serverTimestamp()});
    toast("Запись сохранена ✦"); closeModal(); renderDiary();

  } else if(type==="Шаблон"){
    const title=($("f-title")?.value||"").trim(), text=($("f-text")?.value||"").trim();
    if(!title){alert("Введите название");return;}
    await addDoc(uc("templates"),{title,text,createdAt:serverTimestamp()});
    toast("Шаблон сохранён ✦"); closeModal(); renderDiary();
  }
}

//  CALENDAR
// ════════════════════════════════════════
async function showCal(selectCb=null){
  $("cal-ov").classList.remove("hidden");
  await renderCal(selectCb);
}
async function renderCal(selectCb=null){
  const y=calDate.getFullYear(), m=calDate.getMonth();
  $("cal-month").textContent=`${MONTHS[m]} ${y}`;
  const fd=new Date(y,m,1).getDay(), off=fd===0?6:fd-1;
  const days=new Date(y,m+1,0).getDate();
  const today=new Date(); today.setHours(0,0,0,0);

  // load all data for dots
  const [tasks,ideas,diary]=await Promise.all([sget(uc("tasks")),sget(uc("ideas")),sget(uc("diary"))]);
  const allDates=new Set([...tasks,...ideas,...diary].map(x=>x.date).filter(Boolean));

  let html=["Пн","Вт","Ср","Чт","Пт","Сб","Вс"].map(d=>`<div class="cal-dh">${d}</div>`).join("");
  for(let i=0;i<off;i++){const pd=new Date(y,m,-off+i+1); html+=`<div class="cal-cell other-m"><div class="cc-day">${pd.getDate()}</div></div>`;}
  for(let d=1;d<=days;d++){
    const dt=new Date(y,m,d);
    const ds=dstr(dt);
    const isTod=dstr(dt)===dstr(today);
    const dayTasks=tasks.filter(t=>t.date===ds);
    const evts=dayTasks.slice(0,2).map(t=>`<div class="cc-event">▸ ${esc(t.title)}</div>`).join("");
    html+=`<div class="cal-cell ${isTod?"today":""}" data-date="${ds}">
      <div class="cc-day">${d}</div>
      ${evts}
      ${allDates.has(ds)&&!dayTasks.length?'<div class="cc-event">•</div>':""}
    </div>`;
  }
  $("cal-grid").innerHTML=html;
  $("cal-detail").innerHTML="";

  $("cal-grid").querySelectorAll(".cal-cell:not(.other-m)").forEach(cell=>{
    cell.addEventListener("click",async()=>{
      $("cal-grid").querySelectorAll(".cal-cell").forEach(c=>c.classList.remove("selected"));
      cell.classList.add("selected");
      const ds=cell.dataset.date;
      if(selectCb){ selectCb(new Date(ds)); hideCal(); return; }
      // Show detail
      const dt=tasks.filter(t=>t.date===ds);
      const di=ideas.filter(x=>x.date===ds);
      const dd=diary.filter(x=>x.date===ds);
      let det=`<div class="cal-det-title">${ds}</div>`;
      if(dt.length) det+=dt.map(t=>`<div class="icard" style="margin-bottom:6px"><div class="ic-chk ${t.done?"on":""}">${t.done?"✓":""}</div><div class="ic-body"><div class="ic-title">${esc(t.title)}</div></div></div>`).join("");
      if(di.length) det+=di.map(x=>`<div style="font-size:11px;color:var(--go-d);padding:4px 0">💡 ${esc(x.title||x.text)}</div>`).join("");
      if(dd.length) det+=dd.map(x=>`<div style="font-size:11px;color:var(--tx-m);padding:4px 0">📖 ${esc(x.title||x.text)}</div>`).join("");
      if(!dt.length&&!di.length&&!dd.length) det+=`<p style="font-size:12px;color:var(--tx-l)">Нет записей</p>`;
      $("cal-detail").innerHTML=det;
    });
  });
}
$("cal-pm").onclick=()=>{ calDate.setMonth(calDate.getMonth()-1); renderCal(); };
$("cal-nm").onclick=()=>{ calDate.setMonth(calDate.getMonth()+1); renderCal(); };
window.showCal=()=>showCal();
window.showCalForDate=(cb)=>showCal(cb);
window.hideCal=()=>$("cal-ov").classList.add("hidden");
$("cal-ov").addEventListener("click",e=>{ if(e.target===$("cal-ov"))hideCal(); });

const tabTitles={dashboard:"Дашборд",plan:"План дня",goals:"Цели",ideas:"Идеи",diary:"Дневник"};
function switchTab(id){
  curTab=id; weekOffset=0;
  document.querySelectorAll(".nt").forEach(t=>t.classList.toggle("on",t.dataset.tab===id));
  document.querySelectorAll(".mod").forEach(m=>m.classList.remove("on"));
  $("tab-"+id)?.classList.add("on");
  renderTab(id);
}
window.switchTab=switchTab;

function renderTab(id){
  if(id==="dashboard") renderDashboard();
  else if(id==="plan") renderPlan();
  else if(id==="goals") renderGoals();
  else if(id==="ideas") renderIdeas();
  else if(id==="diary") renderDiary();
}

document.querySelectorAll(".nt").forEach(t=>t.addEventListener("click",()=>switchTab(t.dataset.tab)));
