<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Life-control</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;600;800&family=Mulish:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/main.css" />
  <link rel="stylesheet" href="css/auth.css" />
  <link rel="stylesheet" href="css/dashboard.css" />
  <link rel="stylesheet" href="css/plan.css" />
  <link rel="stylesheet" href="css/projects.css" />
  <link rel="stylesheet" href="css/chaos.css" />
  <link rel="stylesheet" href="css/modal.css" />
</head>
<body>

  <!-- AUTH SCREEN -->
  <div id="auth-screen" class="screen active">
    <div class="auth-bg">
      <div class="auth-orb orb-1"></div>
      <div class="auth-orb orb-2"></div>
      <div class="auth-orb orb-3"></div>
    </div>
    <div class="auth-container">
      <div class="auth-logo">
        <div class="logo-mark">LC</div>
        <div class="logo-text">
          <span class="logo-title">Life-control</span>
          <span class="logo-version">v1.0</span>
        </div>
      </div>
      <p class="auth-tagline">Твоя система. Твои правила.</p>
      <div class="auth-buttons">
        <button class="btn-auth btn-google" id="btn-google-login">
          <svg width="20" height="20" viewBox="0 0 24 24">
            <path fill="#fff" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
            <path fill="#fff" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
            <path fill="#fff" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
            <path fill="#fff" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
          </svg>
          Войти через Google
        </button>
        <button class="btn-auth btn-yandex" id="btn-yandex-login">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
            <circle cx="12" cy="12" r="12" fill="#fff"/>
            <path d="M13.32 6H11.5C9.57 6 8.25 7.08 8.25 8.92c0 1.6.77 2.5 2.17 3.44L8 18h2.25l2.2-5.35-.6-.38C10.6 11.4 10.1 10.75 10.1 8.97c0-.97.6-1.47 1.43-1.47h1.27V18H15V6h-1.68z" fill="#CC0000"/>
          </svg>
          Войти через Яндекс
        </button>
      </div>
      <p class="auth-note">Данные хранятся в защищённом облаке и доступны только вам</p>
    </div>
  </div>

  <!-- MAIN APP -->
  <div id="app-screen" class="screen">

    <!-- SIDEBAR -->
    <nav id="sidebar" class="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-logo">LC</div>
        <span class="sidebar-appname">Life-control</span>
        <button class="sidebar-close" id="sidebar-close">✕</button>
      </div>
      <div class="sidebar-user" id="sidebar-user">
        <div class="user-avatar" id="user-avatar">?</div>
        <div class="user-info">
          <span class="user-name" id="user-name">Загрузка...</span>
          <span class="user-email" id="user-email"></span>
        </div>
      </div>
      <ul class="sidebar-nav">
        <li><a href="#" class="nav-item active" data-module="dashboard"><span class="nav-icon">⌂</span>Главная</a></li>
        <li><a href="#" class="nav-item" data-module="plan"><span class="nav-icon">◫</span>План дня</a></li>
        <li><a href="#" class="nav-item" data-module="projects"><span class="nav-icon">▤</span>Проекты</a></li>
        <li><a href="#" class="nav-item" data-module="chaos"><span class="nav-icon">↯</span>Место Хаоса</a></li>
      </ul>
      <div class="sidebar-footer">
        <button class="btn-logout" id="btn-logout">↩ Выйти</button>
      </div>
    </nav>
    <div class="sidebar-overlay" id="sidebar-overlay"></div>

    <!-- TOP BAR -->
    <header class="topbar">
      <button class="topbar-menu" id="topbar-menu">
        <span></span><span></span><span></span>
      </button>
      <h1 class="topbar-title" id="topbar-title">Главная</h1>
      <div class="topbar-actions" id="topbar-actions"></div>
    </header>

    <!-- MODULE VIEWS -->
    <main class="main-content">
      <div id="module-dashboard" class="module active"></div>
      <div id="module-plan" class="module"></div>
      <div id="module-projects" class="module"></div>
      <div id="module-chaos" class="module"></div>
    </main>

  </div>

  <!-- GLOBAL MODAL -->
  <div id="modal-overlay" class="modal-overlay hidden">
    <div id="modal-box" class="modal-box">
      <div class="modal-header">
        <h3 id="modal-title"></h3>
        <button id="modal-close" class="modal-close">✕</button>
      </div>
      <div id="modal-body" class="modal-body"></div>
    </div>
  </div>

  <!-- TOAST -->
  <div id="toast" class="toast hidden"></div>

  <script type="module" src="js/firebase-config.js"></script>
  <script type="module" src="js/auth.js"></script>
  <script type="module" src="js/db.js"></script>
  <script type="module" src="js/modal.js"></script>
  <script type="module" src="js/router.js"></script>
  <script type="module" src="js/modules/dashboard.js"></script>
  <script type="module" src="js/modules/plan.js"></script>
  <script type="module" src="js/modules/projects.js"></script>
  <script type="module" src="js/modules/chaos.js"></script>
  <script type="module" src="js/app.js"></script>
</body>
</html>
